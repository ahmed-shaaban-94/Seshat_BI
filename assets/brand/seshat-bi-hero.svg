<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="t d" font-family="Georgia, 'Times New Roman', serif">
  <title id="t">Seshat BI</title>
  <desc id="d">Seshat BI hero banner: a seven-point gold star encircled by a gold orbit with a teal data-network node path, beside the SESHAT BI wordmark and the tagline "From messy retail data to trusted, governed BI."</desc>

  <defs>
    <radialGradient id="field" cx="28%" cy="32%" r="95%">
      <stop offset="0%" stop-color="#052A50"/>
      <stop offset="55%" stop-color="#001E35"/>
      <stop offset="100%" stop-color="#04172A"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#F2C14E"/>
      <stop offset="42%" stop-color="#C69214"/>
      <stop offset="100%" stop-color="#9A6F10"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2C14E"/>
      <stop offset="100%" stop-color="#B07F12"/>
    </linearGradient>
  </defs>

  <!-- field + single gold frame -->
  <rect x="0" y="0" width="1280" height="360" rx="18" fill="url(#field)"/>
  <rect x="11" y="11" width="1258" height="338" rx="12" fill="none" stroke="#C69214" stroke-opacity="0.55" stroke-width="1.6"/>

  <!-- ============ EMBLEM (left) ============ -->
  <g transform="translate(232 180)">
    <!-- orbit ring (near-full, small opening top-right where the node path enters) -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#ring)" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="690 65" stroke-dashoffset="-40"/>
    <!-- gold orbit node (lower-left) -->
    <circle cx="-84" cy="86" r="8.5" fill="#001E35" stroke="#C69214" stroke-width="2.6"/>

    <!-- teal data-network: node path riding the upper-right of the orbit -->
    <g fill="none" stroke="#0B9A9A" stroke-width="2.6" stroke-linecap="round">
      <path d="M 78 -92 L 120 -30 L 108 44 L 62 104"/>
    </g>
    <circle cx="78"  cy="-92" r="9"  fill="#001E35" stroke="#0B9A9A" stroke-width="2.6"/>
    <circle cx="120" cy="-30" r="11" fill="#31C6C2"/>
    <circle cx="108" cy="44"  r="11" fill="#0B9A9A"/>
    <circle cx="62"  cy="104" r="9"  fill="#001E35" stroke="#0B9A9A" stroke-width="2.6"/>

    <!-- clean seven-point star (14 vertices, computed at 360/7 deg spacing, R=100 r=42) -->
    <path fill="url(#goldGrad)" stroke="#8A6410" stroke-width="1" stroke-linejoin="round"
      d="M 0.00 -100.00 L 18.22 -37.84 L 78.18 -62.35 L 40.95 -9.35 L 97.49 22.25 L 32.84 26.19 L 43.39 90.10 L 0.00 42.00 L -43.39 90.10 L -32.84 26.19 L -97.49 22.25 L -40.95 -9.35 L -78.18 -62.35 L -18.22 -37.84 Z"/>
    <circle cx="0" cy="0" r="11" fill="#001E35" opacity="0.9"/>
  </g>

  <!-- ============ WORDMARK (right) ============ -->
  <g transform="translate(470 0)">
    <!-- SESHAT -->
    <text x="0" y="150" font-size="122" letter-spacing="13" fill="#F7F1E7" font-weight="400">SESHAT</text>

    <!-- gold rule under SESHAT, spanning its width -->
    <line x1="4" y1="182" x2="656" y2="182" stroke="#C69214" stroke-width="2.6"/>

    <!-- BI (teal accent token, centered below the rule, per brand board) -->
    <text x="328" y="256" font-size="66" letter-spacing="10" fill="#0B9A9A" font-weight="400" text-anchor="middle">BI</text>

    <!-- system line (ivory, per board) + tagline (bright teal for small-text contrast) -->
    <text x="6" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="21" letter-spacing="6.5" fill="#EFE7D6" font-weight="500">RETAIL BI READINESS SYSTEM</text>
    <text x="6" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="22" letter-spacing="1" fill="#31C6C2" font-style="italic">From messy retail data to trusted, governed BI.</text>
  </g>
</svg>
