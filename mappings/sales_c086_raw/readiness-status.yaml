      - "ROW FILTER applied 2026-07-16 (data owner ruling): excludes 513/249,106 (0.21%) rows where division IN ('ARCHIVE','AUX','','EL EZABY SERVICES'). Each division inspected before dropping: ARCHIVE (6 rows) = retired/discontinued products + penny-value promotional 'gift' lines; AUX (6 rows) = miscellaneous-tagged real drugs, negligible; blank/UNKNOWN (3 rows) = genuinely missing division; EL EZABY SERVICES (498 rows) = NOT product sales at all (injection fees, 'WHATS APP - A' line items, generic 'SPECIAL SERVICE' charges) -- out of scope for a retail sales-of-goods fact. This CHANGES the row-parity invariant used throughout this stage: silver row count is now 248,593, not the full bronze count -- every prior/future row-count check must expect 248,593."
      - "BILLING_TYPE TRANSLATED to English 2026-07-16 (data owner ruling: REPLACE the Arabic value entirely, no dual-language column): Credit Sale / Cash Sale / Credit Return / Cash Return / Pick-Up Order / Pick-Up Order Return / Delivery / Delivery Return / Delivery - Credit / Delivery - Credit Return. BUG CAUGHT AND FIXED during this translation: is_return originally matched the Arabic mrtja prefix directly, which silently missed 'Pick-Up Order Return' (376 rows -- already English in bronze, never carried the Arabic substring), leaving those rows incorrectly classified as non-returns. Fixed by deriving is_return from the TRANSLATED English label (LIKE '%Return%') instead, computed once in a shared CTE so billing_type and is_return can never drift apart. Corrected is_return rate: 12,365/249,106 (4.96%), up from the pre-fix 11,989 (4.81%) by exactly the 376 previously-missed rows."
      - "RENAME MAP reviewed column-by-column with the data owner 2026-07-16: billing_type_2->billing_type_code, date->sale_date, personel_number->staff_code (NOT staff_number -- owner's explicit choice), person_name->staff_name_masked, position->staff_position, buyer->purchaser (added later, during an outlier investigation -- see below); every other kept column renamed identically to source"
      - "buyer RENAMED to purchaser and PROMOTED from a degenerate fact attribute to its own dimension (gold.dim_purchaser_c086), 2026-07-16 (data owner ruling): discovered during a full-invoice investigation of 5 large FROST-spray transactions (2023-11-21, reference_no C0860000190130/190131/190132/190134/190136) that the SAME invoice can carry TWO DIFFERENT purchaser codes across its own line items (e.g. C0860000190130: the FROST line -> 'A.AZIZ', the OZEMPIC line -> 'KHALED') -- worth a standalone dim to filter/group on directly, not left inert as a degenerate dim"
      - "MISSING-VALUE POLICY reviewed and DEVIATES from RC5/RC6 defaults (data owner ruling 2026-07-16): money/quantity columns (quantity, gross_sales, tax, dis_tax, add_dis, subtotal5_discount, paid) stay NULL on blank (RC5 default confirmed, NOT coerced to 0 -- protects SUM() semantics); EVERY text column (including natural keys material/customer/staff_code/buyer, not just grouping dims) uses sentinel 'UNKNOWN' on blank, a deliberate extension beyond RC6's grouping-dim-only scope"
      - "RC2 PK re-proof on TRANSFORMED, POST-FILTER data: COUNT(*) = COUNT(DISTINCT (reference_no, item_no)) = 248,593, 0 rows where either PK column collapsed to the 'UNKNOWN' sentinel; PRIMARY KEY constraint (sales_c086_raw_pkey) verified present via pg_constraint"
      - "is_return derived from the TRANSLATED billing_type (RC8, not quantity sign): measured 12,280/248,593 (4.94%) true after the translation bug fix and the row filter above (all 5 return variants -- Credit/Cash/Delivery/Delivery-Credit/Pick-Up Order Return -- now correctly captured by a single LIKE '%Return%' rule on the English label). CORRECTION: full bronze had 12,365 total return rows; 85 of them (72 Arabic-prefix + 13 Pick-Up Order Return) belonged to the 4 excluded divisions and are now gone from silver along with their division -- 12,365 - 85 = 12,280 checks out exactly. An earlier note in this file wrongly claimed the row filter left the return count unchanged; corrected here after verifying against the data rather than assuming."
      - "person_name PII ruling applied: staff_name_masked is an md5() hash on non-blank names (deterministic -- same staff_code always -> same hash) or the 'UNKNOWN' sentinel on blank; no raw Arabic person_name column present in silver"
      - "sentinel rate spot-checked against known bronze missingness: item_cluster 'UNKNOWN' = 79,734/249,106 (32.01%, exact match); staff_code 'UNKNOWN' = 1,748/249,106 (0.70%, exact match to the known personel_number blank rate); all other kept columns show 0 'UNKNOWN' rows, consistent with their 0% source blank rate"
      - "NET-SALES QUESTION CLOSED 2026-07-16 (data owner, final ruling): there is NO net-sales measure in this model. gross_sales is the standing 'sales' measure going forward. This supersedes the earlier 'net_sales_computed' open placeholder (which anticipated a formula from gross_sales/tax/dis_tax/add_dis -- those tax/discount columns were dropped from the model in the same session, so the placeholder had nothing left to compute from). If net sales is ever needed later, it is a NEW decision requiring a fresh governance ruling, not a resumption of this one."
      - "COLUMNS DROPPED 2026-07-16 (data owner, final post-hoc review, after silver had already passed once): tax, dis_tax, add_dis, subtotal5_discount, paid (5 money columns), and purchaser (formerly buyer, which had itself been renamed and promoted to its own dimension gold.dim_purchaser_c086 earlier the same session -- that dimension is now removed too). Re-verified after the drop: row count (248,593) and RC2 PK proof both unchanged."
