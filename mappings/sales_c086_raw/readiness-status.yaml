stages:

  source_ready:
    status: "pass"
    evidence:
      - "mappings/sales_c086_raw/source-profile.md (249,106 rows; 46 source cols + 2 lineage; mechanical numbers via seshat.profile.profile())"
      - "PK RULED 2026-07-16 (data owner, see approvals[]): grain PK is (reference_no, item_no). reference_no is uniform format (always C086 + 10 digits, site code embedded); billing_document REJECTED as PK -- it mixes two prefixes ('0' on 215,297 rows vs letter 'O' on 33,809 rows), and the O-prefix rows exactly match where fi_document_no is blank (33,809), indicating billing_document conflates two different document/channel types under one column"
      - "returns rule measured from authoritative column billing_type (Arabic mrtja values); sign-alone would misclassify 2,030 rows"
      - "NET-SALES RULED 2026-07-16 (data owner, see approvals[]): net_sales landed column is UNRELIABLE and REJECTED as a derivation source. gross_sales+dis_tax+add_dis-tax==net_sales holds on only 90.4% (225,191/249,106) rows; tested 7 alternative formulas (subtotal5_discount/salse_not_tax/kzwi1/paid combinations), none improved on 90.4%. Of the 23,915 mismatches, only 4,723 (19.7%) are rounding noise (<=0.01); the remaining 19,192 have a material residual (avg 6.18, range -921.04..5225.44) not explained by any tested column combination. Mismatch rate is roughly uniform (~10-11%) across every billing_type -- not concentrated in returns or one channel, so it is not a returns-handling artifact. Decision: do NOT carry landed net_sales forward as a trusted measure; a new net-sales calculation will be authored in source-map.yaml / the silver build from first principles (gross_sales, tax, discounts), not reconciled against this column."
      - "BLANK-SEMANTICS RULED 2026-07-16 (data owner, see approvals[]): item_cluster blank (32.01%, 79,734 rows) = unknown/missing, despite measuring as a stable per-material attribute (0 / 9,690 materials show both blank and non-blank item_cluster across their rows -- the blank is consistent per material, not scattered per transaction). assignment blank (46.88%, 116,776 rows) = unknown/missing, despite measuring 85.5% populated on billing_type='اجل' (credit) rows and 0% populated on 'فورى' (cash) and most other billing types -- a pattern consistent with a credit-account reference field. certification (67.96% blank) DROPPED from the model entirely -- populated rate varies by division (0% Cosmetics .. ~38% OTC) without a clean applicability pattern, and the data owner chose not to resolve its meaning rather than guess."
      - "PII RULED 2026-07-16 (data owner, see approvals[]): person_name (91.15% populated, 142 distinct) confirmed as STAFF/EMPLOYEE data (sample roles: driver/سائق, cashier/موظف كاشير, pharmacist/صيدلى, branch manager/مدير صيدلية) -- ruled MASK/PSEUDONYMIZE before any downstream exposure. customer_name (100% populated, 512 distinct) confirmed as predominantly B2B/institutional (insurance companies, pharma distributors, branch names -- e.g. AXA-EGYPT, ASTRAZENECA offers; only 517/249,106 rows show a redacted-looking hash pattern) -- ruled LOW RISK, KEEP AS-IS. insurance_tel and insurance_no (61.9% populated each, 154,088/249,106 rows, only ~0.1% placeholder/zero values) confirmed as genuine third-party insurance contact/policy data -- ruled DROP ENTIRELY from the model, excluded from source-map.yaml."
