      - "BUG FOUND AND FIXED on first live run (2026-07-16): the migration failed on its own UNIQUE grain-key constraint (reference_no, item_no) = (C0860010004024, 5) duplicated. Root cause: dim_staff_c086 was built with a plain GROUP BY staff_code, which produced a REAL dimension row for the literal string 'UNKNOWN' (1,745 silver rows carry this sentinel from the missing-value policy) IN ADDITION to the manually-inserted -1 unknown-member row (which also uses the label 'UNKNOWN') -- two dimension rows sharing one natural-key value. Every staff_code='UNKNOWN' silver row then fanned out across BOTH matching dimension rows in the fact LEFT JOIN, silently duplicating fact rows. Reproduced deterministically on a second run (ruled out as a query-nondeterminism fluke) before being diagnosed and fixed by excluding the sentinel value from each dimension's natural-key population (WHERE <> 'UNKNOWN'), applied as a standing safeguard to all 4 entity dims, not just dim_staff_c086."
      - "POST-FIX VERIFICATION (RC16): row-count reconciliation silver (248,593) = gold fact (248,593); grain-key (reference_no, item_no) proven unique on the gold fact itself (248,593 = 248,593 distinct); ZERO orphan FKs across all 5 dimensions (product_sk, billing_type_sk, customer_sk, staff_sk, date_sk); SUM(gross_sales) and SUM(quantity) reconcile EXACTLY between silver and gold (38,804,001.54 and 286,098.392 respectively, to the cent/unit); dim_staff_c086 confirmed to have 0 duplicate natural keys post-fix; 1,745 fact rows correctly route to the staff -1 unknown member, matching the known blank-staff_code count exactly (proving the fix routes correctly rather than just avoiding the constraint failure)"
