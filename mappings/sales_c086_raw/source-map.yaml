# =============================================================================
# source-map.yaml  --  sales_c086_raw (C086 pharmacy branch sales export)
# =============================================================================
# Filled instance of templates/source-map.yaml (Seshat_BI kit). The machine-readable
# spine of the source-mapping gate for bronze.sales_c086_raw. Authored from the
# committed source-profile.md, the four Source Ready rulings recorded in
# readiness-status.yaml approvals[] (PK, net-sales, blank-semantics, PII), and a
# column-by-column keep/drop review conducted directly with the data owner
# (Ahmed Shaaban) on 2026-07-16. NO silver.* SQL is written until this map itself
# is reviewed and approved. ASCII only.
#
# RC ids = ADR-0002 cleaning defaults (RC1-RC16); see docs/decisions/0002-retail-
# cleaning-defaults.md in the Seshat_BI kit repo. Deviations recorded below.
# =============================================================================

meta:
  table_id: "sales_c086_raw"
  source_system: "pharmacy_branch_c086_sales_export"
  profiled_from: "mappings/sales_c086_raw/source-profile.md"
  # GRAIN (RC1): one row = one billing line item within one document.
  grain: "one row = one billing-document line item"
  # PRIMARY KEY (RC2): RULED 2026-07-16 (data owner) -- unique on landed data
  # (249,106 = 249,106, 0 null). billing_document REJECTED (format-split evidence,
  # see source-profile.md Candidate grain & PK). Re-verify on transformed silver output.
  primary_key:
    - "reference_no"
    - "item_no"
  reviewed_by: "Ahmed Shaaban (data_owner)"
  reviewed_on: "2026-07-16"

defaults:
  adopted:
    - "RC1"   # lowest grain (billing line item)
    - "RC2"   # verify PK on transformed data
    - "RC3"   # drop no-signal columns (knumv, ref_return_date, cosm_mg, area_mg -- all 100%/single-value)
    - "RC5"   # '' -> NULL baseline; missingness '' OR NULL
    - "RC7"   # money -> NUMERIC; date -> DATE; leading-zero/site-coded ids stay TEXT
    - "RC8"   # is_return from authoritative billing_type column, never measure sign
    - "RC10"  # billing_type_2 short code kept alongside its 1:1 label billing_type
    - "RC14"  # gold Kimball star (_sk, -1 unknown member, FK COALESCE, degenerate dims)
    - "RC15"  # contiguous generate_series date dim
  deviations:
    - id: "RC4"
      reason: "insurance_tel / insurance_no are genuine third-party PII (61.9% populated, ~0.1% placeholder) -- data owner RULED drop entirely (2026-07-16), consistent with the RC4 default (no keep-deviation needed, this IS the default applied). person_name is STAFF PII (not customer/patient) -- data owner RULED mask/pseudonymize rather than drop; this is a deviation from the RC4 default (drop), recorded here because the column is KEPT under a transform, not dropped outright."
      detail_in: "mappings/sales_c086_raw/readiness-status.yaml (approvals[], PII ruling 2026-07-16)"
    - id: "RC9"
      reason: "landed net_sales does NOT satisfy gross_sales+dis_tax+add_dis-tax on 9.6% of rows (23,915 rows; 80.3% of those with a material, non-rounding residual). Data owner RULED (2026-07-16) that landed net_sales is unreliable and will NOT be carried forward; net sales will be computed from first principles (gross_sales, tax, discounts) in the silver build instead of trusting this column. Further, during the column-by-column mapping review, salse_not_tax and kzwi1 (both tested as net-sales candidates, neither closed the gap alone) were ALSO dropped rather than carried as independent landed measures -- a further deviation from RC9's default of keeping every independent money measure, made because these two showed no standalone analytical value beyond the failed net-sales reconciliation attempt."
      detail_in: "mappings/sales_c086_raw/source-profile.md (Semantics: Money-relationship check)"
    - id: "RC6"
      reason: "item_cluster blank measured as NON-random (a stable per-material attribute: 0/9,690 materials show mixed blank/non-blank). Despite that structural evidence, data owner RULED it genuinely unknown/missing (NULL), not a sentinel -- i.e. RC5's null-for-unknown applies even though the data suggested a cleaner structural read. assignment and certification were DROPPED entirely during the column review rather than kept with a null/sentinel policy (assignment despite measuring as a likely credit-account reference field; certification for lack of a clean applicability pattern) -- so RC6 (sentinel-for-grouping-dims) does not apply to either of those two; only item_cluster remains in-model with a plain null policy."
      detail_in: "mappings/sales_c086_raw/readiness-status.yaml (approvals[], blank-semantics ruling 2026-07-16)"
    - id: "RC12"
      reason: "mat_group / mat_group_2 (both proven 1:1, 0 fan-out) were DROPPED entirely during the column-by-column review rather than kept as a flat denormalized product attribute -- the data owner judged category/subcategory/segment/division already cover product classification for this model without needing the mat_group level."
      detail_in: "column review, 2026-07-16 (conversational, this session)"

# -----------------------------------------------------------------------------
# columns -- one entry per SOURCE column (46 source + 2 lineage). Every source
