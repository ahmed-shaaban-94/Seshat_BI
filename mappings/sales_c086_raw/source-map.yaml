# -----------------------------------------------------------------------------
# row_filters -- Phase 2.6, applied in the silver WHERE clause (never invented
# implicitly; every filter here must be independently reviewable, same as a
# column decision). This is the ONE deliberate deviation from bronze row-count
# parity in this table's silver build.
# -----------------------------------------------------------------------------
row_filters:
  - condition: "division IN ('ARCHIVE', 'AUX', '', 'EL EZABY SERVICES')"
    action: "exclude"
    reviewed_by: "Ahmed Shaaban (data_owner)"
    reviewed_on: "2026-07-16"
    rows_affected: 513
    reason: "Inspected each division before excluding. ARCHIVE (6 rows) = retired/discontinued products + penny-value promotional 'gift' line items. AUX (6 rows) = miscellaneous-tagged real drugs, negligible volume. Blank/'' (3 rows) = genuinely missing division (the sentinel-eligible blank population). EL EZABY SERVICES (498 rows) = NOT product sales at all -- injection fees, a 'WHATS APP - A' line item, and generic 'SPECIAL SERVICE' charges; out of scope for a retail sales-of-goods fact."
    caveat: "85 of the 513 excluded rows (72 Arabic-prefix return rows + 13 'Pick-Up Order Return' rows) were RETURN transactions. Excluding them changes the full-table is_return count from 12,365 (full bronze) to 12,280 (post-filter silver) -- a real, verified reduction, not an oversight left undocumented. Anyone reconciling silver's return count against a bronze-level total must account for this 85-row gap."

# -----------------------------------------------------------------------------
# gold_star -- Kimball star at the ruled grain (RC14). One fact + conformed dims.
# -----------------------------------------------------------------------------
gold_star:

  fact:
    name: "gold.fct_sales_c086"
    grain: "one row = one billing-document line item"   # = meta.grain (RC1)
    business_key:                                        # composite grain (#331): dbt parity counts distinct on EXACTLY this ordered list
      - "reference_no"
      - "item_no"
    measures:                                            # RC9: independent measures kept
      - "quantity"
      - "gross_sales"          # CLOSED 2026-07-16 (data owner): this IS the
                                # standing "sales" measure for this table.
                                # No net-sales figure will be computed -- see
                                # derived_columns for the closure note.
    additive_money_measures:                             # #331: subset of measures that are additive MONEY; dbt parity reconciles each by SUM exactly. quantity is a qty measure, NOT money -> excluded.
      - "gross_sales"
      # tax, dis_tax, add_dis, subtotal5_discount, paid, net_sales, salse_not_tax,
      # and kzwi1 are all deliberately absent -- dropped from the model. The
      # first five were dropped 2026-07-16 in a post-hoc column review; net_sales
      # (landed) was rejected earlier (RC9 deviation, unreliable formula);
      # salse_not_tax/kzwi1 were dropped as failed net-sales candidates with no
      # independent value. With tax/discounts also gone, there is no remaining
      # plan to derive a net-sales measure at all -- gross_sales is final.

  dimensions:
    - name: "gold.dim_product_c086"
      surrogate_key: "product_sk"
      has_unknown_member: true             # RC14
      attributes:
        - "material"
        - "material_desc"
        - "category"
        - "subcategory"
        - "segment"
        - "division"
        - "brand"
        - "item_cluster"
        # mat_group / mat_group_2 / item_status dropped in the column review

    - name: "gold.dim_billing_type_c086"
      surrogate_key: "billing_type_sk"
      has_unknown_member: true             # RC14
      attributes:
        - "billing_type"
        - "billing_type_code"

    - name: "gold.dim_customer_c086"
      surrogate_key: "customer_sk"
      has_unknown_member: true             # RC14
      attributes:
        - "customer"
        - "customer_name"                  # PII ruled low-risk, kept as-is

    - name: "gold.dim_staff_c086"
      surrogate_key: "staff_sk"
      has_unknown_member: true             # RC14
      attributes:
        - "staff_code"
        - "staff_name_masked"              # PII masked per governance ruling (RC4 deviation)
        - "staff_position"

    # dim_purchaser_c086 REMOVED 2026-07-16: buyer/purchaser was renamed and
    # promoted to this dimension earlier the same session, then dropped from
    # the model entirely in a later post-hoc column review. See the "buyer"
    # column entry above for the full history.

  # Transaction identifiers with no attributes of their own -> degenerate dims on
  # the fact (RC14): they are columns of the fact, not their own table.
  # billing_document, fi_document_no, ref_return, and crm_order were all dropped
  # in the column review; buyer/purchaser was PROMOTED to its own dim (see
  # dim_purchaser_c086 above) -- so the degenerate-dim list is now just the two
  # grain-key columns.
  degenerate_dimensions:
    - "reference_no"           # grain key (ruled PK component)
    - "item_no"                # grain key (ruled PK component)

  date_dimension:
    name: "gold.dim_date_c086"
    surrogate_key: "date_sk"               # YYYYMMDD integer
    method: "generate_series"              # RC15: contiguous, one row per calendar day
    contiguous: true
    span:
      from: "2023-01-01"                   # earliest sale_date measured
      to: "2025-12-31"                     # latest sale_date measured

# -----------------------------------------------------------------------------
# derived_columns -- computed in silver, not present in the source (Phase 2.7).
# -----------------------------------------------------------------------------
derived_columns:

  # is_return (RC8): from the AUTHORITATIVE billing_type column, NEVER the
  # quantity sign (measured: sign-alone would misclassify 2,030 rows).
  - name: "is_return"
    type: "boolean"
    derived_from: "billing_type (the TRANSLATED English value, computed once and reused -- not re-derived from the Arabic source separately)"
    rule: "billing_type LIKE '%Return%' (matches all 5 return variants: Credit Return, Cash Return, Delivery Return, Delivery - Credit Return, Pick-Up Order Return) -> true, else false"
    note: "RC8: authoritative column, not measure sign. CORRECTED 2026-07-16 during billing_type English translation: the original rule matched the Arabic مرتجع prefix directly, which silently missed 'Pick-Up Order Return' (376 rows -- already English in bronze, never carried the Arabic substring). Final measured rate: 12,365/249,106 (4.96%) true (up from the pre-fix 11,989 -- the +376 difference is exactly the previously-missed rows). Sign-alone would have misclassified 1,667 return rows with non-negative quantity + 363 non-return rows with negative quantity (2,030 total) -- still the reason billing_type, not the sign, is authoritative."

  # net_sales -- CLOSED 2026-07-16 (data owner ruling, final decision, not a
  # placeholder anymore): there is NO net-sales measure in this model. gross_sales
  # is the standing "sales" measure for this table going forward. This
  # supersedes the earlier "net_sales_computed" placeholder, which anticipated
  # deriving a net-sales figure from gross_sales/tax/dis_tax/add_dis -- those
  # tax/discount inputs were themselves dropped from the model in the same
  # session (see the "tax" column entry), so the placeholder had nothing left
  # to compute from even before this closure. Do not re-open this by inventing
  # a net-sales formula later without a fresh governance ruling; if net sales
  # is ever needed, treat it as a new decision, not a resumption of this one.
