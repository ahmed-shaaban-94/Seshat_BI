# -----------------------------------------------------------------------------
# gold_star -- Phase 6 target (RC14). 1 fact at invoice-line grain + 4 entity dims.
# (No dim_branch: single-branch extract -> branch is a constant, not a dim -- Q3.)
# -----------------------------------------------------------------------------
gold_star:

  fact:
    name: "fct_sales"
    grain: "one row = one invoice line item"   # = meta.grain (RC1)
    measures:                                   # RC9 independent measures
      - "gross_sales"
      - "net_sales"
      - "tax_amount"
      - "discount_amount"
      - "quantity"

  dimensions:
    - name: "dim_product"
      surrogate_key: "product_sk"
      has_unknown_member: true                  # RC14 -1 member
      attributes:                               # flat (RC12 -- multi-parent hierarchy)
        - "product_id"
        - "product_name"
        - "category"
        - "subcategory"
        - "segment"
        - "division"
        - "brand"
        - "material_group"
        - "item_cluster"
        - "item_status"
    - name: "dim_customer"
      surrogate_key: "customer_sk"
      has_unknown_member: true                  # RC14 -1 unknown member
      keyed_on: "customer_id_clean"             # the REMAPPED id (Q6), not the raw 'C086'
      attributes:
        - "customer_id_clean"                   # 'WALK_IN' for the 85,911 site-code rows
    - name: "dim_salesperson"
      surrogate_key: "salesperson_sk"
      has_unknown_member: true
      attributes:
        - "salesperson_id"
        - "salesperson_position"
    - name: "dim_billing_type"
      surrogate_key: "billing_type_sk"
      has_unknown_member: true
      attributes:
        - "billing_type_code"
        - "billing_type_label"

  degenerate_dimensions:
    - "invoice_no"
    - "line_no"
    - "invoice_reference"
    - "original_invoice_ref"

  date_dimension:
    name: "dim_date"
    surrogate_key: "date_sk"                    # YYYYMMDD integer
    method: "generate_series"                   # RC15 contiguous
    contiguous: true
    span:
      from: "2023-01-01"                        # earliest real sale_date
      to: "2025-12-31"                          # latest real sale_date

# -----------------------------------------------------------------------------
# derived_columns -- computed in silver, not present in the source.
# -----------------------------------------------------------------------------
derived_columns:

  - name: "is_return"
    type: "boolean"
    derived_from: "billing_type_2"              # AUTHORITATIVE, not the measure sign (RC8)
    rule: "billing_type_2 IN ('Z4','Z5','Z6','Z8','Z10') -> true, else false"
    note: "RC8: the 5 Z-codes whose Arabic label means return (transliterated murtaja). 12,365 return rows (4.96%). Full code->label map and confirmation in unresolved-questions Q1. UNMAPPED billing codes must raise loudly, not silently default."

  # customer_id_clean (Q6): a VALUE REMAP, not a missing-value policy. The raw
  # `customer` is non-null but 85,911 rows hold the SITE code 'C086' (the branch),
  # not a customer id. A missing_policy sentinel cannot fix this (the value is
  # present, not '' or NULL). This explicit CASE relabels the contaminated value so
  # dim_customer never gains a member literally keyed 'C086'.
  - name: "customer_id_clean"
    type: "text"
    derived_from: "customer"                    # remaps the raw landed id
    rule: "CASE WHEN trim(customer) = 'C086' (= the site code) THEN 'WALK_IN' ELSE customer END"
    note: "Q6 proposed default (analyst must confirm the business meaning). 'WALK_IN' is a MEANINGFUL member, distinct from the dim's -1 unknown member. dim_customer is keyed on customer_id_clean, NOT the raw customer. If Q6 instead routes these to the -1 unknown member, drop this derived column and leave the raw id to COALESCE to -1."
