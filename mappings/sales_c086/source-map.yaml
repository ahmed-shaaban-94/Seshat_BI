# =============================================================================
# source-map.yaml  --  sales_c086 (El Ezaby pharmacy branch C086 sales)
# =============================================================================
# Filled instance, authored by walking the HYBRID cleaning chain (skill +
# docs/medallion-playbook.md Phase 2) interactively with the data-owner
# (Ahmed Shaaban) on 2026-06-29. Decisions rest on a live read-only profile of
# bronze.sales_c086_raw. NOT copied from the prior c086 worked example.
#
# Chain order applied (final): keep/drop FIRST -> grain/PK validates -> PII ->
# per-column (rename + type + missing + placement) -> row filters -> derive -> gate.
#
# RC ids = ADR-0002 cleaning defaults (separate namespace from the checker's D1-D8).
# =============================================================================

meta:
  table_id: "sales_c086"
  source_system: "retail_pos_export"
  profiled_from: "mappings/sales_c086/source-profile.md"
  grain: "one row = one invoice line item"        # 249,106 bronze -> 246,916 silver (post-filter)
  # PRIMARY KEY: a GENERATED surrogate over the post-filter silver rows. The natural
  # key (billing_document, item_no) is retained in SILVER ONLY for the RC2 uniqueness
  # /dedup proof, and is NOT exposed to gold (decision: surrogate-PK pattern, D4).
  primary_key:
    - "sale_sk"                                    # generated IDENTITY 1..246,916 (post-filter)
  natural_key_silver_only:                         # the dedup proof; hidden from gold
    - "billing_document"
    - "item_no"
  reviewed_by: "<PENDING REVIEW -- judgment-call ANSWERS recorded by Ahmed Shaaban; map REVIEW still pending>"
  reviewed_on: "<PENDING>"

defaults:
  adopted:
    - "RC1"    # lowest grain (invoice line)
    - "RC2"    # PK proven -- via the silver-only natural key (surrogate is unique by construction)
    - "RC3"    # drop no-signal columns
    - "RC4"    # PII removed early (truly-sensitive cols dropped; staff/company names are NOT PII -- see assumptions)
    - "RC5"    # '' -> NULL (per-column, no global baseline -- see chain note)
    - "RC7"    # money/qty NUMERIC; leading-zero ids TEXT
    - "RC8"    # is_return from authoritative billing_type_2, not the measure sign
    - "RC12"   # flat product hierarchy (subcategory multi-parent)
    - "RC14"   # gold Kimball star (-1 unknown member + FK COALESCE + degenerate dims)
    - "RC15"   # contiguous generate_series date dim
  deviations:                                      # detail + triggering facts in assumptions.md
    - id: "RC9"
      reason: "only 2 measures kept (gross_sales, quantity); net/tax/all discount columns dropped at keep/drop per data-owner. Independent-measure default not fully adopted."
      detail_in: "mappings/sales_c086/assumptions.md"
    - id: "RC2"
      reason: "fact PK is a GENERATED surrogate (sale_sk), not the natural key. Natural key kept silver-only for the proof; surrogate exposed to gold."
      detail_in: "mappings/sales_c086/assumptions.md"
    - id: "RC6"
      reason: "single-branch site kept as a 1-member dim_branch; customer site-code contamination remapped to a WALK_IN member (a value remap, not a sentinel)."
      detail_in: "mappings/sales_c086/assumptions.md"

