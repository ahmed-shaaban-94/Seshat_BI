# =============================================================================
# source-map.yaml  --  sales_c086 (El Ezaby pharmacy branch C086 sales)
# =============================================================================
# Filled instance of the source-mapping spine. Decisions derived from an
# INDEPENDENT live read-only profile (2026-06-29), recorded in source-profile.md.
# NOT copied from the prior c086 worked example. Some decisions are deliberately
# raised as unresolved-questions (the build is blocked until answered).
#
# RC ids cited here are ADR-0002 cleaning defaults (RC1-RC16), a separate
# namespace from the `retail check` governance D1-D8 rules.
# =============================================================================

meta:
  table_id: "sales_c086"
  source_system: "retail_pos_export"            # xlsx sales export, faithfully landed
  profiled_from: "mappings/sales_c086/source-profile.md"
  grain: "one row = one invoice line item"      # RC1, decided FIRST
  primary_key:                                  # RC2, unique on landed data (0 NULL)
    - "billing_document"                        # invoice id  -> silver invoice_no
    - "item_no"                                 # line number -> silver line_no
  reviewed_by: "<PENDING REVIEW -- name the reviewer>"
  reviewed_on: "<PENDING>"                       # quoted so it is not auto-typed

defaults:
  adopted:
    - "RC1"    # lowest grain (invoice line item)
    - "RC2"    # PK verified on data; re-verify on transformed output
    - "RC3"    # drop no-signal columns (knumv, ref_return_date 100% empty)
    - "RC4"    # PII removed early (default drop, pending governance -- Q2)
    - "RC5"    # '' -> NULL baseline
    - "RC7"    # money/qty NUMERIC; leading-zero ids TEXT
    - "RC8"    # is_return from authoritative billing_type_2, not measure sign
    - "RC9"    # keep independent money measures
    - "RC12"   # flat product hierarchy (subcategory is multi-parent)
    - "RC14"   # gold Kimball star (+ -1 member, FK COALESCE, degenerate dims)
    - "RC15"   # contiguous generate_series date dim
  deviations:
    # No clean RC deviation; instead this table surfaces a DATA-QUALITY issue the
    # prior run folded in silently: the contaminated customer field. It is raised
    # as a blocking question (Q6), not a default override. See assumptions.md.
    - id: "RC6"
      reason: "single-branch constants (site/site_name) + walk-in customer member need an explicit sentinel/member ruling (Q3, Q6) -- not a plain '' -> NULL"
      detail_in: "mappings/sales_c086/assumptions.md"

