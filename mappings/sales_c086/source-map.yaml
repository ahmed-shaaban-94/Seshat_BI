# -----------------------------------------------------------------------------
# row_filters (Phase C) -- applied bronze->silver. ORDERING (D12): the blank-
# division filter targets a BLANK and MUST evaluate PRE-sentinel (before the
# division 'UNCLASSIFIED' substitution above), else trim(division)='' matches 0
# rows and the 3 blank rows survive. Implement: filter on raw blanks first.
# -----------------------------------------------------------------------------
row_filters:
  filters:
    - name: "junk_division"
      rule: "drop where upper(trim(division)) IN ('AUX','ARCHIVE','EL EZABY SERVICES') OR trim(division)=''"
      rows_dropped: 513
      pre_sentinel: true                            # D12: must run before division sentinel substitution
    - name: "zero_value_line"
      rule: "drop where quantity::numeric = 0 AND gross_sales::numeric = 0"
      rows_dropped: 1680
  overlap_rows: 3
  reconciliation: "513 + 1680 - 3 overlap = 2190 dropped; 249106 - 2190 = 246916 silver rows"

# -----------------------------------------------------------------------------
# gold_star (Phase 6 / RC14). 1 fact (sale_sk PK) + 6 entity dims + date dim.
# -----------------------------------------------------------------------------
gold_star:

  fact:
    name: "fct_sales"
    grain: "one row = one invoice line item (246,916 post-filter)"
    primary_key: "sale_sk"                          # generated surrogate
    measures:                                       # only 2 kept (RC9 deviation)
      - "gross_sales"
      - "quantity"

  dimensions:
    - name: "dim_product"
      surrogate_key: "product_sk"
      has_unknown_member: true
      attributes:                                   # flat (RC12 multi-parent)
        - "product_id"
        - "product_name"
        - "brand"
        - "category"
        - "subcategory"
        - "segment"
        - "division"
        - "cluster"
    - name: "dim_customer"
      surrogate_key: "customer_sk"
      has_unknown_member: true
      keyed_on: "customer_id_clean"                 # the WALK_IN remap, not raw customer_id
      attributes:
        - "customer_id_clean"
        - "customer_name"
    - name: "dim_salesperson"
      surrogate_key: "salesperson_sk"
      has_unknown_member: true                      # 1,748 blank-id rows land here
      attributes:
        - "salesperson_id"
        - "salesperson_name"
        - "salesperson_position"
    - name: "dim_product_purchaser"
      surrogate_key: "purchaser_sk"
      has_unknown_member: true
      attributes:
        - "product_purchaser"
    - name: "dim_billing_type"
      surrogate_key: "billing_type_sk"
      has_unknown_member: true
      attributes:
        - "billing_type_code"
        - "billing_type_label"
    - name: "dim_branch"
      surrogate_key: "branch_sk"
      has_unknown_member: true
      attributes:
        - "branch_id"
        - "branch_name"

  degenerate_dimensions:
    - "invoice"                                     # reference_no

  # Date dim: contiguous calendar; carries NO -1/unknown member (D10/S8) so Power BI
  # can mark it as a date table. An unmatched fact date fails via date_sk NOT NULL.
  date_dimension:
    name: "dim_date"
    surrogate_key: "date_sk"                        # YYYYMMDD integer
    method: "generate_series"
    contiguous: true
    has_unknown_member: false                       # D10/S8 -- NO sentinel/null row
    span:
      from: "2023-01-01"
      to: "2025-12-31"

# -----------------------------------------------------------------------------
# derived_columns -- computed in silver, not present in the source.
# -----------------------------------------------------------------------------
derived_columns:

  - name: "sale_sk"
    type: "bigint"
    derived_from: "row_identity"                    # generated IDENTITY/row_number over POST-FILTER rows
    rule: "generated 1..246916 over the silver rows AFTER row_filters; the fact PK"
    note: "generated after row_filters so it numbers the 246,916 surviving rows (no gaps)."

  - name: "is_return"
    type: "boolean"
    derived_from: "billing_type_2"                  # AUTHORITATIVE, not the measure sign (RC8)
    rule: "billing_type_2 IN ('Z4','Z5','Z6','Z8','Z10') -> true, else false"
    note: "Q1 ANSWERED 2026-06-29 by Ahmed Shaaban. 5 Z-codes whose Arabic label means return; each also negative avg_net. UNMAPPED codes raise loudly."

  - name: "billing_type_label"
    type: "text"
    derived_from: "billing_type_2"                  # English label from the CODE (Q1, RC10)
    rule: "map billing_type_2 -> English label (table below); UNMAPPED -> raise loudly"
    map:
      FP:  "Credit Sale"
      Z1:  "Cash Sale"
      Z3:  "Delivery"
      Z7:  "Delivery - Credit"
      Z9:  "Pick-Up Order"
      Z4:  "Cash Return"
      Z5:  "Credit Return"
      Z6:  "Delivery Return"
      Z8:  "Delivery - Credit Return"
      Z10: "Pick-Up Order Return"
    note: "Q1: 10 codes 1:1 with billing_type_2; the 5 Return labels == is_return=true. RC10: code is the join key, label standardized to English."

  - name: "customer_id_clean"
    type: "text"
    derived_from: "customer"                        # VALUE REMAP (present-but-wrong, not missing)
    rule: "CASE WHEN trim(customer) = 'C086' (the site code) THEN 'WALK_IN' ELSE customer END"
    note: "Q6: 85,911 rows carry the site code as a customer id (walk-in/cash). 'WALK_IN' is a meaningful member, distinct from the dim -1 unknown. dim_customer is keyed on this, not raw customer."
