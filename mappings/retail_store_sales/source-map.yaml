# =============================================================================
# source-map.yaml  --  retail_store_sales (Kaggle "retail store sales, dirty")
# =============================================================================
# Filled instance of templates/source-map.yaml. The machine-readable spine of the
# source-mapping gate for bronze.retail_store_sales in the `training` DB. Authored
# from the committed source-profile.md; NO silver.* SQL is written until this map is
# reviewed and approved. Grain decided FIRST (RC1). ASCII only.
#
# RC ids = ADR-0002 cleaning defaults (RC1-RC16); see assumptions.md for adopted vs
# deviated. Two deviations on this table: RC8 (no returns in this source) and RC4
# (customer_id kept pending governance) -- both raised in unresolved-questions.md.
# =============================================================================

meta:
  table_id: "retail_store_sales"
  source_system: "kaggle_retail_store_sales_dirty"
  profiled_from: "mappings/retail_store_sales/source-profile.md"
  # GRAIN (RC1): one row = one retail transaction (a TXN_* sale event).
  grain: "one row = one retail transaction"
  # PRIMARY KEY (RC2): unique on landed data (12,575 = 12,575, 0 null); re-verify on
  # the transformed silver output.
  primary_key:
    - "transaction_id"
  reviewed_by: "data_owner"               # gate CLEARED; see readiness-status.yaml approvals[]
  reviewed_on: "2026-06-25"

defaults:
  adopted:
    - "RC1"   # lowest grain (transaction)
    - "RC2"   # verify PK on transformed data
    - "RC3"   # drop no-signal columns (none here)
    - "RC5"   # '' -> NULL baseline; missingness '' OR NULL
    - "RC7"   # money/qty -> NUMERIC; date -> DATE; TXN/CUST ids stay TEXT
    - "RC9"   # keep independent measures (quantity, total_spent)
    - "RC12"  # flat denorm dim attributes (item encodes category)
    - "RC13"  # silver as idempotent numbered migration
    - "RC14"  # gold Kimball star (_sk, -1 unknown member, FK COALESCE, degenerate dims)
    - "RC15"  # contiguous generate_series date dim
    - "RC16"  # reconcile totals + 0 orphan FKs
  deviations:
    - id: "RC8"
      reason: "no returns in this source -- all measures strictly positive, no transaction-type/return column; data owner confirmed returns live in a separate figure/system. is_return is N/A here."
      detail_in: "mappings/retail_store_sales/assumptions.md"
    - id: "RC4"
      reason: "customer_id is a pseudonymous surrogate (CUST_xx), not raw PII; KEEP as a dimension (RC4 auto-drop deviation). Q1 RESOLVED 2026-06-25 (data owner): keep, no raw PII."
      detail_in: "mappings/retail_store_sales/unresolved-questions.md"

# -----------------------------------------------------------------------------
# columns -- one entry per SOURCE column (the 11; lineage _source_file/_loaded_at
# are infrastructure, not mapped).
# -----------------------------------------------------------------------------
columns:

  - source_name: "transaction_id"
    decision: "keep"
    reason: "the grain key; unique on the data -> degenerate dim on the fact (RC14)"
    rename_to: "transaction_id"
    silver_type: "text"                    # TXN_ id stays TEXT (RC7)
    missing_policy: "null"
    pii: false
    gold_placement: "degenerate_dim"

  - source_name: "customer_id"
    decision: "keep"                       # Q1 RESOLVED (data owner 2026-06-25); RC4 deviation stands
    reason: "pseudonymous customer surrogate (CUST_xx, 25 distinct) -> dim_customer. NOT raw PII; KEPT (Q1 resolved 2026-06-25, deviation from the RC4 auto-drop)."
    rename_to: "customer_id"
    silver_type: "text"
    missing_policy: "null"
    pii: true                              # flagged; governance decides publish-safety (Q1)
    deviation_ref: "RC4"                   # KEPT by the RC4 governance ruling (Q1 resolved); names its deviation
    gold_placement: "dim:dim_customer.customer_id"

  - source_name: "category"
    decision: "keep"
    reason: "product category (8 distinct); attribute of the product dimension"
    rename_to: "category"
    silver_type: "text"
    missing_policy: "null"
    pii: false
    gold_placement: "dim:dim_product.category"

  - source_name: "item"
    decision: "keep"
    reason: "product key (Item_N_CAT, 201 distinct); 1:1 with category (0 fan-out). 9.65% missing -> handling is Q4."
    rename_to: "item"
    silver_type: "text"
    missing_policy: "null"                 # blank -> NULL (RC5); -1 unknown member in gold
    pii: false
    gold_placement: "dim:dim_product.item"

  - source_name: "price_per_unit"
    decision: "keep"
    reason: "unit price money measure; float-as-text -> exact NUMERIC (RC7). 4.84% missing."
    rename_to: "price_per_unit"
    silver_type: "numeric(12,2)"
    missing_policy: "null"
    pii: false
    gold_placement: "fact_measure"

  - source_name: "quantity"
    decision: "keep"
    reason: "units sold; float-as-text -> NUMERIC (range 1..10). 4.80% missing. Independent measure (RC9)."
    rename_to: "quantity"
    silver_type: "numeric(12,2)"           # landed as float (10.0); keep NUMERIC, not int, until analyst confirms integer-only
    missing_policy: "null"
    pii: false
    gold_placement: "fact_measure"

  - source_name: "total_spent"
    decision: "keep"
    reason: "line total money measure; = price_per_unit * quantity on 100% of complete rows. Kept as independent landed measure (RC9); silver MAY recompute the 604 blanks from price*qty (analyst decision, noted in assumptions)."
    rename_to: "total_spent"
    silver_type: "numeric(12,2)"
    missing_policy: "null"
    pii: false
    gold_placement: "fact_measure"

  - source_name: "payment_method"
    decision: "keep"
    reason: "Cash / Credit Card / Digital Wallet (3 distinct); transaction attribute"
    rename_to: "payment_method"
    silver_type: "text"
    missing_policy: "null"
    pii: false
    gold_placement: "dim:dim_payment_method.payment_method"

  - source_name: "location"
    decision: "keep"
    reason: "In-store / Online (2 distinct); transaction channel attribute"
    rename_to: "location"
    silver_type: "text"
    missing_policy: "null"
    pii: false
    gold_placement: "dim:dim_location.location"

  - source_name: "transaction_date"
    decision: "keep"
    reason: "YYYY-MM-DD; spans 2022-01-01..2025-01-18 -> dim_date FK (RC15 contiguous calendar)"
    rename_to: "transaction_date"
    silver_type: "date"                    # RC7: date -> DATE
    missing_policy: "null"
    pii: false
    gold_placement: "dim:dim_date.full_date"

  - source_name: "discount_applied"
    decision: "keep"
    reason: "discount FLAG (True/False); NOT a return marker. 33.39% blank. Q2 RESOLVED 2026-06-25 (data owner): a blank is UNKNOWN -> NULL boolean, NOT coerced to False; discount metrics EXCLUDE unknowns. Kept as a degenerate dim on the fact."
    rename_to: "discount_applied"
    silver_type: "boolean"                 # Q2 resolved: CASE lower(NULLIF(x,'')) -> true/false, blank -> NULL
    missing_policy: "null"                 # RC5: blank = unknown -> NULL (NOT coerced to False), per Q2
    pii: false
    gold_placement: "degenerate_dim"

# -----------------------------------------------------------------------------
# gold_star -- one fact at transaction grain + conformed dims (RC14).
# -----------------------------------------------------------------------------
gold_star:

  fact:
    # gold-qualified + _rss suffix: the star shares the `gold` schema with C086's
    # fct_sales, so this table is fct_sales_rss. retail validate reads these names
    # VERBATIM (the check SQL does not prepend `gold.`), so they must be schema-
    # qualified and match the materialized tables in 0004_*.sql exactly.
    name: "gold.fct_sales_rss"
    grain: "one row = one retail transaction"      # = meta.grain (RC1)
    measures:                                       # RC9: independent measures
      - "quantity"
      - "total_spent"
      # price_per_unit kept as a fact attribute (unit rate), not summed

  dimensions:
    - name: "gold.dim_customer_rss"
      surrogate_key: "customer_sk"
      has_unknown_member: true             # RC14: -1 unknown member
      attributes:
        - "customer_id"                    # pseudonymous natural key (Q1: kept)

    - name: "gold.dim_product_rss"
      surrogate_key: "product_sk"
      has_unknown_member: true             # RC14: covers the 9.65% missing item (Q4)
      attributes:
        - "item"                           # product natural key
        - "category"                       # flat denorm attribute (item->category 1:1, RC12)

    - name: "gold.dim_payment_method_rss"
      surrogate_key: "payment_method_sk"
      has_unknown_member: true
      attributes:
        - "payment_method"

    - name: "gold.dim_location_rss"
      surrogate_key: "location_sk"
      has_unknown_member: true
      attributes:
        - "location"

  degenerate_dimensions:
    - "transaction_id"                     # the grain key, no attributes
    - "discount_applied"                   # discount flag (boolean; Q2 resolved -> blank = NULL unknown)

  date_dimension:
    name: "gold.dim_date_rss"
    surrogate_key: "date_sk"               # YYYYMMDD integer
    method: "generate_series"              # RC15: contiguous, one row per calendar day
    contiguous: true
    has_unknown_member: false              # S8: a marked date table carries NO -1/NULL
                                           # member; unmatched fact dates fail-loud (NOT NULL)
    span:
      from: "2022-01-01"                   # earliest transaction_date
      to: "2025-01-18"                     # latest transaction_date

# -----------------------------------------------------------------------------
# derived_columns -- computed in silver (none required at landing).
# is_return is N/A (RC8 deviation: no returns in this source).
# -----------------------------------------------------------------------------
derived_columns: []
