report_id: "branch_performance_weekly"
subject_area: "mappings/retail_store_sales"

audience: "branch_manager"
purpose: "monitoring"
supported_decision: "which branches/categories/channels need attention this period"
review_cadence: "weekly"

business_questions:
  - question_id: "q1"
    text: "How are we doing overall right now? (headline volume + basket value + discount share)"
  - question_id: "q2"
    text: "How do sales move over time -- trend / seasonality?"
  - question_id: "q3"
    text: "Which product categories drive sales and units?"
  - question_id: "q4"
    text: "How do sales split by channel (location: in-store vs online) and payment method?"
  - question_id: "q5"
    text: "What is the basket value (avg transaction value) and how does it vary by channel?"
  - question_id: "q6"
    text: "Who are the highest-activity customers (transaction count)?"

# metric roles -- REFERENCE BY NAME ONLY, the 5 approved contracts already on
# the shipped binding map (mappings/retail_store_sales/design/visual-contract-binding-map.md).
outcome_metrics:
  - name: "TotalSales"
    store_ref: "mappings/retail_store_sales/metrics/TotalSales.yaml"
    status_required: "pass"
  - name: "TransactionCount"
    store_ref: "mappings/retail_store_sales/metrics/TransactionCount.yaml"
    status_required: "pass"
  - name: "AvgTransactionValue"
    store_ref: "mappings/retail_store_sales/metrics/AvgTransactionValue.yaml"
    status_required: "pass"
driver_metrics:
  - name: "TotalQuantity"
    store_ref: "mappings/retail_store_sales/metrics/TotalQuantity.yaml"
    status_required: "pass"
guardrail_metrics:
  - name: "DiscountedTransactionRate"
    store_ref: "mappings/retail_store_sales/metrics/DiscountedTransactionRate.yaml"
    status_required: "pass"

comparisons:
  - "vs prior period"
  - "trend over time (month)"

dimensions_and_filters:
  - field: "dim_date_rss.full_date"
  - field: "dim_product_rss.category"
  - field: "dim_location_rss.location"
  - field: "dim_payment_method_rss.payment_method"
  - field: "dim_customer_rss.customer_id"

expected_actions_and_exceptions:
  - "flag branches/categories below prior-period sales"
  - "surface the discount-rate caveat: 33.39% of transactions have unknown discount status (floor 33.55% if treated as not-discounted)"

pages_and_drill_paths:
  - "executive_overview (single page; KPI strip -> trend -> category/channel breakdowns -> top-customer detail table)"

mobile_accessibility_language_rtl:
  mobile_needs: "none"
  accessibility_needs: "none"
  language: "en"
  rtl_required: "false"

exclusions_and_non_goals:
  - "margin/profit (no cost data in this source)"
  - "returns (none in this source)"

owner: "Ahmed Shaaban (report_owner)"

