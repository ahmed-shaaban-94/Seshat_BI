# -----------------------------------------------------------------------------
# gold_star -- the Phase 6 target shape (RC14): 1 fact at line grain + 6
# conformed dims. Every dim has a -1 unknown member; fact FKs COALESCE to -1.
# -----------------------------------------------------------------------------
gold_star:

  fact:
    name: "fct_sales"                    # gold.fct_sales, line-item grain
    grain: "one row = one invoice line item"   # = meta.grain (RC1)
    measures:                            # RC9: independent money/qty measures
      - "quantity"
      - "sales_amount"
      - "net_amount"
      - "tax_amount"
      - "discount_amount"

  dimensions:
    - name: "dim_product"
      surrogate_key: "product_sk"        # RC14: _sk surrogate key
      has_unknown_member: true           # RC14: -1 unknown member
      attributes:                        # flat denormalized levels (RC12)
        - "product_id"                   # RC7: leading-zero id stays TEXT
        - "product_name"
        - "product_division"
        - "product_category"
        - "product_subcategory"
        - "product_segment"
        - "product_brand"
        - "product_group"
        - "product_cluster"
        - "business_segment"             # RC11 rollup (derived) lands on dim_product

    - name: "dim_customer"
      surrogate_key: "customer_sk"
      has_unknown_member: true           # RC14
      attributes:
        - "customer_id"                  # RC7: leading-zero id stays TEXT
        - "customer_name"

    - name: "dim_salesperson"
      surrogate_key: "salesperson_sk"
      has_unknown_member: true           # RC14 (live: 71 fact rows on -1)
      attributes:
        - "salesperson_id"
        - "salesperson_name"
        - "job_title"

    - name: "dim_billing_type"
      surrogate_key: "billing_type_sk"
      has_unknown_member: true           # RC14
      attributes:
        - "billing_type"                 # Arabic -> English (RC10)
        - "billing_type_code"            # authoritative Z-code (join key)
        - "is_return"                    # RC8 derived flag also lands on dim_billing_type (bool_or)

    - name: "dim_branch"
      surrogate_key: "branch_sk"
      has_unknown_member: true           # RC14
      attributes:
        - "branch_code"                  # RC7: leading-zero id stays TEXT
        - "branch_name"

  # Transaction identifiers with no attributes -> degenerate dims ON the fact (RC14).
  degenerate_dimensions:
    - "invoice_no"
    - "line_no"
    - "original_invoice_ref"

  # Date dimension is a CONTIGUOUS generated calendar over the full span (RC15).
  date_dimension:
    name: "dim_date"
    surrogate_key: "date_sk"             # YYYYMMDD-style key
    method: "generate_series"            # RC15: contiguous, one row per calendar day
    contiguous: true
    span:
      from: "2023-01-01"                 # earliest real fact date
      to: "2025-12-31"                   # latest real fact date (1,096 rows)

# -----------------------------------------------------------------------------
# derived_columns -- not present in the source, computed in silver (Phase 2.7,
# build step 7). Each names the AUTHORITATIVE source column it derives from.
# -----------------------------------------------------------------------------
derived_columns:

  # is_return (RC8): from the AUTHORITATIVE billing code, NEVER the measure sign.
  - name: "is_return"
    type: "boolean"
    derived_from: "billing_type_code"
    rule: "billing_type_code IN ('Z4','Z5','Z6','Z8','Z10') -> true, else false"
    note: "RC8: authoritative Z-code, not the quantity/amount sign. See assumptions.md."

  # Business rollup (RC11): analyst-supplied division -> segment map; ELSE 'UNMAPPED'.
  - name: "business_segment"
    type: "text"
    derived_from: "product_division"
    mapping_source: "mappings/c086/assumptions.md"   # the analyst mapping lives there
    unmapped_default: "UNMAPPED"
    note: "RC11: enumerated division->segment CASE (PHARMA/HVI/NON-PHARMA); never invented."
