# =============================================================================
# source-map.yaml  --  C086 (El Ezaby pharmacy sales) FILLED INSTANCE
# =============================================================================
# Back-authored from the committed, live-validated warehouse:
#   warehouse/migrations/0001_create_silver_sales_c086.sql
#   warehouse/migrations/0002_create_gold_star.sql
# See: docs/worked-examples/c086-pharmacy.md (narrative) and
#      docs/c086-adr0002-compliance.md (the 16/16 RC matrix + live run).
#
# This is the machine-readable spine of the source-mapping gate for C086: each
# source column mapped to (a) its silver column and (b) its placement in the
# gold Kimball star. The gate is CLEARED -- 16/16 ADR-0002 defaults pass,
# validated live on 2026-06-24 (read-only vs ezaby_demo).
#
# RC ids below are ADR-0002 cleaning defaults (RC1-RC16). The retail check
# governance checker uses a SEPARATE D1-D8 namespace. Distinct prefixes, no
# collision (disambiguated in feature 002).
# =============================================================================

# -----------------------------------------------------------------------------
# meta -- grain decided FIRST (Phase 2.0 / RC1). Grain fixes the non-droppable
# structural keys.
# -----------------------------------------------------------------------------
meta:
  table_id: "sales_c086"
  source_system: "el_ezaby_pharmacy_pos"
  profiled_from: "mappings/c086/source-profile.md"   # Phase 1 evidence this map rests on
  # GRAIN (Phase 2.0 / RC1): the lowest grain the source provides.
  grain: "one row = one invoice line item"
  # PRIMARY KEY (Phase 2.0 / RC2): verified unique on the data AND re-verified on
  # the transformed silver output (live: 246,916 rows = 246,916 distinct, 0 NULL).
  primary_key:
    - "invoice_no"
    - "line_no"
  reviewed_by: "back-authored from committed 0001/0002 (live-validated)"
  reviewed_on: "2026-06-24"

# -----------------------------------------------------------------------------
# defaults -- C086 ADOPTS all 16 ADR-0002 defaults as-is. ZERO deviations.
# (Confirmed against the migration SQL + the live run; see assumptions.md.)
# -----------------------------------------------------------------------------
defaults:
  adopted:                            # ADR-0002 defaults taken as written (all 16)
    - "RC1"   # model at lowest grain (invoice line item)
    - "RC2"   # verify PK on transformed data (live: 246,916 distinct, 0 NULL)
    - "RC3"   # drop no-signal columns (code halves kept only where a join key)
    - "RC4"   # PII removed EARLY (insurance_no / insurance_phone dropped)
    - "RC5"   # '' -> NULL baseline (NULLIF on every cast; junk filter runs first)
    - "RC6"   # sentinel only on grouping dims, 0-collision verified
    - "RC7"   # exact NUMERIC money/qty; leading-zero IDs stay TEXT; line_no smallint
    - "RC8"   # is_return from authoritative billing code, never the measure sign
    - "RC9"   # keep independent money measures (gross/net/tax/discount)
    - "RC10"  # unify categorical encodings (billing_type Arabic -> English)
    - "RC11"  # business_segment rollup from analyst-supplied division map
    - "RC12"  # product hierarchy kept flat (multi-parent overlaps preserved)
    - "RC13"  # silver as TABLE via idempotent numbered migration; order load-bearing
    - "RC14"  # gold Kimball star (+ -1 member, FK COALESCE, degenerate dims)
    - "RC15"  # contiguous generate_series date dim (2023-01-01 .. 2025-12-31)
    - "RC16"  # cross-layer reconciliation + 0 orphan FKs (live: penny-exact)
  deviations: []                      # none -- C086 adopted 16/16

# -----------------------------------------------------------------------------
