    decision: "keep"
    reason: "product natural key; leading zeros must be preserved (RC7)"
    rename_to: "product_id"
    silver_type: "text"                  # RC7: leading-zero id stays TEXT
    missing_policy: "null"
    pii: false
    gold_placement: "dim:dim_product.product_id"

  - source_name: "material_desc"
    decision: "keep"
    reason: "product display name; de-mojibaked via whitelist regexp_replace"
    rename_to: "product_name"
    silver_type: "text"
    missing_policy: "null"
    pii: false
    gold_placement: "dim:dim_product.product_name"

  - source_name: "quantity"
    decision: "keep"
    reason: "core qty measure; negatives are returns; exact NUMERIC (RC7/RC9)"
    rename_to: "quantity"
    silver_type: "numeric(18,4)"         # RC7: qty -> exact NUMERIC, never float
    missing_policy: "null"
    pii: false
    gold_placement: "fact_measure"

  - source_name: "gross_sales"
    decision: "keep"
    reason: "gross money measure; independent, not derivable (RC9)"
    rename_to: "sales_amount"
    silver_type: "numeric(18,2)"         # RC7: money -> exact NUMERIC
    missing_policy: "null"
    pii: false
    gold_placement: "fact_measure"

