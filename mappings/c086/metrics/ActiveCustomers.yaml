# Metric contract -- ActiveCustomers (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.

name: "ActiveCustomers"
grain: "a distinct count valid at any rollup; recomputed at the current filter grain. NOT additive -- never sum across slices (the same customer can appear in two slices)."
formula_intent: >-
  How many distinct customer identities transacted in the current filter -- counted
  as distinct customer keys ON THE FACT (a customer that never appears on a sale is
  not counted). This DELIBERATELY INCLUDES the single collapsed WALK_IN anonymous
  member: on the full unfiltered model that is 637 named customers + 1 WALK_IN
  member = 638. The dim_customer table also carries a -1 'UNKNOWN' member, but the
  fact has ZERO rows on customer_sk = -1, so counting distinct keys over the fact
  never picks it up -- which is exactly why a plain distinct count is safe here.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "customer_sk"                       # distinct-counted ON the fact (not over dim_customer)
  pii_sensitive: false

readiness:
  status: "warning"
  evidence:
    - "definition approved by Ahmed Shaaban (data_owner) 2026-07-02 (adversarial-audit remediation, F009 metric-owner sign-off)"
  blocking_reasons: []
  warnings:
