# Metric contract -- SalesPerCounterAgent (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesPerCounterAgent"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Average net sales per counter agent (product purchaser) -- NetSales divided by
  the count of real purchasers (16 agents; -1 excluded). VERIFY LIVE -- derived
  value ~2.43M, not independently anchored (exact figure held outside git).
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "purchaser_sk"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
