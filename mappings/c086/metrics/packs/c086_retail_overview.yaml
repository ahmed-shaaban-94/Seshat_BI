# =============================================================================
# c086_retail_overview.yaml -- the El Ezaby (C086) pharmacy retail KPI pack
# =============================================================================
# Groups the 33 metric contracts under mappings/c086/metrics/ into the eight
# families a retail sales-overview dashboard answers. A pack REFERENCES contracts
# by their stable PascalCase name; it does not redefine them. Readiness rolls up
# from members (a pack is no more ready than its least-ready contract).
#
# Bound to the gold star gold.fct_sales (246,916 invoice lines, 2023-2025).
# DAX for these measures lives in the PBIP model (powerbi/c086 _sales.SemanticModel),
# organized into display folders matching the families below. NetSales/TotalUnits
# are the base measures every composed measure references.
# =============================================================================

pack:
  pack_name: "c086_retail_overview"
  purpose: "the headline retail sales, basket, customer, trend, product-mix and productivity KPIs for the El Ezaby (C086) pharmacy gold star"
  owner: "Pharmacy Sales Analytics lead"
  contracts:
    # --- Sales (headline money + volume) ---
    - "NetSales"
    - "GrossSales"
    - "Returns"
    - "TotalUnits"
    # --- Returns ---
    - "ReturnValueRate"
    - "LineReturnRate"
    # --- Basket / Transaction ---
    - "Transactions"
    - "SaleTransactions"
    - "AverageOrderValue"
    - "UnitsPerBasket"
    - "AverageLineValue"
    # --- Customer ---
    - "ActiveCustomers"
    - "NamedCustomers"
    - "NamedCustomerSales"
    - "SalesPerNamedCustomer"
    - "WalkInSalesShare"
    - "CustomerRepeatRate"
    # --- Time Intelligence ---
    - "NetSalesPriorYear"
    - "NetSalesYoY"
    - "NetSalesYTD"
    - "NetSalesMoM"
    - "NetSales3MonthRolling"
    # --- Product mix / ranking ---
    - "SalesMixPctByDivision"
    - "TopProductByNetSales"
    - "ProductCountSold"
    - "SalesPerProduct"
    - "ABCClassAShare"
    # --- Staff productivity ---
    - "ActiveSalespeople"
    - "SalesPerSalesperson"
    - "SalesPerCounterAgent"
    # --- Segment ---
    - "WeekendSalesShare"
    - "SalesByBillingType"
    - "SalesByBranch"

  readiness:
    status: "blocked"
    evidence: []
    blocking_reasons:
      - "member contracts CustomerRepeatRate, SalesPerProduct, ABCClassAShare are blocked (Principle V judgment calls); the pack is no more ready than its least-ready member."
      - "no member contract is owner-approved to pass yet; all are not_started/warning/blocked pending the named owner's review."
