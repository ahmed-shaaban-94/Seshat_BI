# Metric contract -- SalesByBranch (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesByBranch"
grain: "additive at invoice-line grain; a NetSales split, not a new measure."
formula_intent: >-
  Net sales split by store branch. Reuses NetSales on a dim_branch branch_name axis.
  THIN DIM WARNING: 1 real store + the -1 unknown, so cross-branch comparison is
  effectively single-valued. Kept to future-proof multi-store expansion.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "gold.dim_branch.branch_name"
  pii_sensitive: false

readiness:
  status: "warning"
  evidence: []
  blocking_reasons: []
