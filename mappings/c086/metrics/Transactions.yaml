# Metric contract -- Transactions (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "Transactions"
grain: "a distinct count valid at any rollup; NOT additive across line-grain slices."
formula_intent: >-
  How many distinct sales transactions (baskets) occurred -- the distinct count of
  the degenerate invoice id on the fact. One invoice = one basket. Includes
  return-only invoices. On the full model = 102,579.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "invoice"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
