name: "LineReturnRate"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Share of sale LINES that were returns -- count of return lines divided by all
  lines. Count-based sibling of ReturnValueRate. On the full model = 4.29%.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "is_return"
  pii_sensitive: false

