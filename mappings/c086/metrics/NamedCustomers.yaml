# Metric contract -- NamedCustomers (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.

name: "NamedCustomers"
grain: "a distinct count valid at any rollup; recomputed at the current filter grain. NOT additive -- never sum across slices."
formula_intent: >-
  How many distinct IDENTIFIED (named) customers transacted in the current filter --
  the ActiveCustomers count with the anonymous walk-in aggregate removed and the
  unknown member removed. Two identities are excluded: the collapsed WALK_IN member
  (dim_customer[customer_id] = 'WALK_IN', which pools 84,770 anonymous lines into one
  key) and the -1 'UNKNOWN' member. On the full unfiltered model = 637. NOTE the -1
  member's customer_id is the text 'UNKNOWN', NOT 'WALK_IN', so a text-only
  <> 'WALK_IN' filter would NOT drop it -- the surrogate-key exclusion customer_sk
  <> -1 is required (and it must be byte-identical to the exclusion used by
  NamedCustomerSales and SalesPerNamedCustomer).
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "customer_sk"                       # distinct-counted ON the fact
    # dim dependency (the WALK_IN filter reads dim_customer):
    - "gold.dim_customer.customer_id"     # = 'WALK_IN' is the excluded anonymous aggregate
    - "gold.dim_customer.customer_sk"     # = -1 is the excluded unknown member
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
