# Metric contract -- SalesByBillingType (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesByBillingType"
grain: "additive at invoice-line grain; a NetSales split, not a new measure."
formula_intent: >-
  Net sales split by billing type (Cash/Credit/Delivery/Pick-Up and their return
  variants). Reuses NetSales on a dim_billing_type billing_type_label axis; return
  types render negative. The split sums to the 38,804,001.54 grand total.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "gold.dim_billing_type.billing_type_label"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
