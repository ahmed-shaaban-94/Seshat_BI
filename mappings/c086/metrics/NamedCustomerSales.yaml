# Metric contract -- NamedCustomerSales (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.

name: "NamedCustomerSales"
grain: "valid at fct_sales line-item grain; additive across all dimensions and over time (a sum of money, already net of returns)."
formula_intent: >-
  The total net money taken from IDENTIFIED (named) customers only -- the net-sales
  sum restricted to sales whose customer is neither the anonymous WALK_IN aggregate
  nor the -1 unknown member. Because is_return rows carry NEGATIVE gross_sales, this
  sum is ALREADY NET OF RETURNS (it is not a gross figure). The named/walk-in split
  is exhaustive on this model: named + walk-in = total net, because the fact has no
  unknown-customer rows -- so NamedCustomerSales + WalkInSales must reconcile exactly
  to NetSales. The exclusion predicate (customer not WALK_IN and customer_sk <> -1)
  MUST be byte-identical to the one used by NamedCustomers and SalesPerNamedCustomer.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"                       # SUMmed; already net of returns via signed return rows
    # dim dependency (the WALK_IN filter reads dim_customer):
    - "gold.dim_customer.customer_id"     # = 'WALK_IN' excluded
    - "gold.dim_customer.customer_sk"     # = -1 excluded
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
