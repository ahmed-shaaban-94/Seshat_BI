# Metric contract -- CustomerRepeatRate (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. BLOCKED -- Principle-V stop-and-ask (identity gap for walk-ins).
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.

name: "CustomerRepeatRate"
grain: "would be a RATIO valid at any rollup -- but it is NOT DEFINABLE over the whole customer base on this model (see blocking_reasons)."
formula_intent: >-
  INTENDED meaning: the share of customers who transacted on more than one distinct
  invoice (repeat / returning customers) -- a retention signal. This is IMPOSSIBLE to
  compute honestly over the whole customer base on the C086 model: the majority of
  lines (84,770 anonymous lines) collapse into ONE single WALK_IN identity, so
  "repeat purchase" is undefined for the anonymous majority -- one WALK_IN key is not
  one returning person, and two walk-in invoices are not evidence of the SAME person
  returning. Reporting a whole-base repeat rate would either count the single WALK_IN
  aggregate as one always-repeating customer or silently drop the anonymous majority;
  both fabricate a retention number the data cannot support. A NAMED-ONLY repeat rate
  IS definable (scoped to the 637 identified customers, walk-in explicitly excluded),
  but it has no ground-truth anchor and must be verified live before use -- author it
  as a SEPARATE named-scoped metric at status warning, never fold walk-ins in.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  # BLOCKED (AL1): binding held as placeholder -- whole-base repeat rate is impossible
  #   (WALK_IN collapses identity). intended on named-only resolution: gold.fct_sales / [customer_sk, invoice, gold.dim_customer.customer_id]
  gold_table: "gold.<fact>"
  columns:
    - "<customer_sk>"
    - "<invoice>"
    - "<gold.dim_customer.customer_id>"
  pii_sensitive: false

readiness:
  status: "blocked"
  evidence: []
  blocking_reasons:
    - >-
      Principle-V stop-and-ask (identity gap): the WALK_IN member collapses 84,770
      anonymous lines into a single identity, so repeat-purchase / retention is
      undefined for the anonymous majority of the base. A whole-base retention KPI
      cannot be computed without fabricating an answer. Resolution requires a human
      decision to EITHER (a) scope the KPI to named customers only (walk-in excluded,
      author as a separate named-scoped metric, verify live) OR (b) supply a
      customer-identity resolution rule for walk-ins (none exists in the source).
      The agent does not invent either.
