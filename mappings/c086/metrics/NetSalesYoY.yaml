# Metric contract -- NetSalesYoY (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "NetSalesYoY"
grain: "a ratio valid at a date rollup; NOT additive."
formula_intent: >-
  Year-over-year percent change in net sales -- (NetSales minus NetSalesPriorYear)
  divided by NetSalesPriorYear. Blank when no prior year (2023 = blank).
  Meaningful at year grain: 2024 = +12.9%, 2025 = -3.9%.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "gold.dim_date.full_date"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
