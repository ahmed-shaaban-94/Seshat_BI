name: "NetSalesPriorYear"
grain: "a time-shifted lookup on the marked date table; NOT additive across windows."
formula_intent: >-
  Net sales for the same period one year earlier than the dates in view -- the YoY
  comparison baseline. Anchors on the marked date table dim_date full_date.
  On the full model = 25,702,853.93 (2023+2024; 2022 has no data).
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "gold.dim_date.full_date"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
