# Metric contract -- WalkInSalesShare (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# A ratio (percentage) metric: NOT additive -- recompute at each grain, never sum.

name: "WalkInSalesShare"
grain: "a RATIO (percentage) valid at any rollup; recomputed at the current filter grain. NOT additive -- never sum or average-of-averages."
formula_intent: >-
  What share of total net sales comes from the anonymous WALK_IN aggregate --
  net sales attributed to the WALK_IN customer member divided by TOTAL net sales
  (all customers, the unfiltered net-sales headline in the current filter). Both
  numerator and denominator are already net of returns (return rows carry negative
  gross_sales). The denominator is the FULL net-sales total, not a named-only subset,
  so this reads as "of every pound taken, this fraction was anonymous walk-in." On
  the full model this is derived (walk-in has no standalone ground-truth figure):
  WalkInSales = NetSales - NamedCustomerSales = ~38.80M - ~29.64M = ~9.17M,
  giving ~9.17M / ~38.80M = 23.63% (exact figures held outside git). A ratio:
  compute at the display grain, never average-of-averages.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"                       # numerator (WALK_IN net) and denominator (all net)
    # dim dependency (the WALK_IN filter reads dim_customer):
    - "gold.dim_customer.customer_id"     # = 'WALK_IN' selects the numerator row-set
  pii_sensitive: false

readiness:
  status: "warning"
  evidence:
    - "definition approved by Ahmed Shaaban (data_owner) 2026-07-02 (adversarial-audit remediation, F009 metric-owner sign-off)"
  blocking_reasons: []
  warnings:
    - "live value not yet captured: c086 gold is not built (silver/gold SQL authored 0005/0006, not applied + live-validated). Promote to pass after a read-only retail validate run."
