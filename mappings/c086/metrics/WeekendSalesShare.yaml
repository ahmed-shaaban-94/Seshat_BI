# Metric contract -- WeekendSalesShare (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "WeekendSalesShare"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Share of net sales on weekend days (Sat/Sun) -- weekend net divided by total net,
  using the marked date table is_weekend flag. On the full model = 28.86%.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "gold.dim_date.is_weekend"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
