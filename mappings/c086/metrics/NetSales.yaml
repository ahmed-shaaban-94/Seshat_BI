name: "NetSales"
grain: "fully additive at fct_sales invoice-line grain; rolls up to any dimension and over time."
formula_intent: >-
  The headline money figure: total sales taken net of returns. Return lines carry
  negative amounts, so a plain sum of the sale amount is already net of returns.
  On the full unfiltered model = 38,804,001.54 EGP.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
