# Metric contract -- ABCClassAShare (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "ABCClassAShare"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Share of net sales from the top 20% of products (Pareto class A). The 20%
  threshold is an analyst-supplied business convention, not derived from data.
  On the full model = 88.30% (strong Pareto concentration).
owner: "Pharmacy Sales Analytics lead"
binds_to:
  # BLOCKED (AL1): binding held as placeholder until owner ratifies the 20% ABC threshold.
  #   intended on resolution: gold.fct_sales / [gross_sales, gold.dim_product.product_sk]
  gold_table: "gold.<fact>"
  columns:
    - "<gross_sales>"
    - "<gold.dim_product.product_sk>"
  pii_sensitive: false

readiness:
  status: "blocked"
  evidence: []
  blocking_reasons:
    - "the 20% ABC class-A threshold is a business convention the analyst must supply/ratify (Principle V -- business rollup)."
