# Metric contract -- SalesMixPctByDivision (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesMixPctByDivision"
grain: "a ratio valid at a product-division rollup; NOT additive -- never sum mix pct."
formula_intent: >-
  Each product division share of net sales -- that division net sales divided by
  total net sales across visible divisions (re-based via ALLSELECTED).
  RX 48.16%, OTC 29.00%, NUTRACEUTICAL 13.33%.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "gold.dim_product.division"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
