# Metric contract -- ReturnValueRate (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "ReturnValueRate"
grain: "a ratio valid at any rollup; NOT additive -- never sum rates."
formula_intent: >-
  Return money as a share of gross sales -- the value-weighted return rate.
  Absolute value of Returns divided by GrossSales. On the full model = 7.46%.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "is_return"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
