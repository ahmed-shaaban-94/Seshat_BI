# Metric contract -- SalesPerProduct (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesPerProduct"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Average net sales per distinct product sold -- NetSales divided by the count of
  products that actually sold (NOT the catalog size). BLOCKED: the denominator
  basis is an owner judgment call; verify live.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  # RATIFIED 2026-07-02: owner chose the denominator basis (distinct products that
  #   SOLD, not catalog size), so the binding is now settled to the real columns.
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "product_sk"
  pii_sensitive: false

readiness:
  status: "warning"
  evidence:
    - "Principle-V ratification by Ahmed Shaaban (data_owner) 2026-07-02: the denominator is distinct products that ACTUALLY SOLD (rows present on the fact), NOT the full catalog size (decision affirmed via the audit-remediation prompt)."
    - "definition approved by Ahmed Shaaban (data_owner) 2026-07-02 (F009 metric-owner sign-off)."
  blocking_reasons: []
  warnings:
    - "live ground-truth value not yet captured: c086 gold is not built. Promote to pass after a read-only retail validate run confirms the value against the live fact."
