# Metric contract -- SalesPerProduct (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesPerProduct"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Average net sales per distinct product sold -- NetSales divided by the count of
  products that actually sold (NOT the catalog size). BLOCKED: the denominator
  basis is an owner judgment call; verify live.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  # BLOCKED (AL1): binding held as placeholder until owner picks the denominator basis
  #   (products-that-sold vs full catalog). intended on resolution: gold.fct_sales / [gross_sales, product_sk]
  gold_table: "gold.<fact>"
  columns:
    - "<gross_sales>"
    - "<product_sk>"
  pii_sensitive: false

readiness:
  status: "blocked"
  evidence: []
  blocking_reasons:
    - "denominator basis is a judgment call: distinct products that SOLD vs full catalog size (9,669). Owner must choose before promotion."
    - "no live ground-truth value captured; must be confirmed against the live fact."
