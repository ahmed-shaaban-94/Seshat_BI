# Metric contract -- SalesPerNamedCustomer (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# A ratio metric: NOT additive -- it must be recomputed at each grain, never summed.

name: "SalesPerNamedCustomer"
grain: "a RATIO valid at any rollup; recomputed at the current filter grain. NOT additive -- never pre-aggregate or average-of-averages."
formula_intent: >-
  The average net money taken per IDENTIFIED (named) customer -- net sales from named
  customers divided by the count of distinct named customers. Numerator and
  denominator are aligned to the SAME row-set: both exclude the anonymous WALK_IN
  aggregate AND the -1 unknown member, with a byte-identical exclusion predicate
  (customer not WALK_IN and customer_sk <> -1). Walk-in sales are deliberately NOT in
  the numerator here, and the single WALK_IN key is NOT in the denominator, so the
  ratio is a true per-identified-customer average. Numerator is already net of returns
  (return rows carry negative gross_sales). On the full model = ~29.64M / 637 =
  ~46.5K (exact figures held outside git). A ratio: compute at the display grain,
  never average-of-averages.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"                       # numerator: SUM over named rows (net of returns)
    - "customer_sk"                       # denominator: distinct named keys on the fact
    # dim dependency (the WALK_IN filter reads dim_customer):
    - "gold.dim_customer.customer_id"     # = 'WALK_IN' excluded (both num + denom)
    - "gold.dim_customer.customer_sk"     # = -1 excluded (both num + denom)
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
