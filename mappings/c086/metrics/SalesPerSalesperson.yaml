# Metric contract -- SalesPerSalesperson (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "SalesPerSalesperson"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Average net sales per active salesperson -- NetSales divided by the count of real
  salespeople (-1 excluded from the count). NOTE row-set asymmetry: the numerator
  includes about 1,748 unattributed (-1) sale lines the denominator excludes, so
  the per-agent average is slightly inflated. Owner accepts or aligns predicates.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "salesperson_sk"
  pii_sensitive: false

readiness:
  status: "warning"
  evidence:
    - "definition approved by Ahmed Shaaban (data_owner) 2026-07-02 (adversarial-audit remediation, F009 metric-owner sign-off)"
  blocking_reasons: []
  warnings:
    - "live value not yet captured: c086 gold is not built (silver/gold SQL authored 0005/0006, not applied + live-validated). Promote to pass after a read-only retail validate run."
