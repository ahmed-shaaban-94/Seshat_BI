# Metric contract -- ActiveSalespeople (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "ActiveSalespeople"
grain: "a distinct count valid at any rollup; NOT additive."
formula_intent: >-
  Distinct real salespeople with at least one sale line, excluding the -1 unknown
  member (which absorbs about 1,748 blank-salesperson lines). On the full model = 256.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "salesperson_sk"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
