# Metric contract -- GrossSales (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "GrossSales"
grain: "additive at invoice-line grain; valid at any rollup."
formula_intent: >-
  Sales from kept (non-return) lines only, before returns net out -- the sum of
  sale amount restricted to non-return lines. GrossSales + Returns = NetSales.
  On the full unfiltered model = ~41.93M EGP (exact figure held outside git; masked 2026-07-02).
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
    - "is_return"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
