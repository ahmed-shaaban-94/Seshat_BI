# Metric contract -- AverageLineValue (filled instance for C086 El Ezaby pharmacy)
# F009 define-layer. PROPOSAL: status not_started until the metric owner approves.
# formula_intent is plain-language INTENT, NOT DAX. binds_to is gold-only.


name: "AverageLineValue"
grain: "a ratio valid at any rollup; NOT additive."
formula_intent: >-
  Net sales per line item across all fact rows (returns in the denominator).
  NetSales divided by the line count. On the full model = 157.15 EGP.
owner: "Pharmacy Sales Analytics lead"
binds_to:
  gold_table: "gold.fct_sales"
  columns:
    - "gross_sales"
  pii_sensitive: false

readiness:
  status: "not_started"
  evidence: []
  blocking_reasons: []
