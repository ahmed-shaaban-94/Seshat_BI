name: seshat_bi
version: 1.0.0
config-version: 2
require-dbt-version: ["=1.12.0"]
profile: seshat_bi_warehouse

model-paths: [models]
macro-paths: [macros]
clean-targets: [target, dbt_packages]

models:
  seshat_bi:
    staging:
      +materialized: table
      +schema: silver
    marts:
      +materialized: table
      +schema: gold
    audit:
      +materialized: view
      +schema: audit
