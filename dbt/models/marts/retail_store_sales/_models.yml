        meta:
          seshat:
            derivation: date_spine
      - name: year
        meta:
          seshat:
            derivation: date_spine
      - name: quarter
        meta:
          seshat:
            derivation: date_spine
      - name: month
        meta:
          seshat:
            derivation: date_spine
      - name: month_name
        meta:
          seshat:
            derivation: date_spine
      - name: day
        meta:
