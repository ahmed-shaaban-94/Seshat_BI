  - name: fct_sales_rss
    config:
      tags: [seshat_table_retail_store_sales]
    meta:
      seshat:
        table_id: retail_store_sales
        source_map: mappings/retail_store_sales/source-map.yaml
        source_map_revision: d679ae199f588c8dc96c2396a7f6877f2ca70c6e
        grain: one row = one retail transaction
        business_key: [transaction_id]
        authority: derived
    columns:
      - name: fct_sales_rss_sk
        meta:
          seshat:
            derivation: surrogate_key
        data_tests:
          - unique:
              config:
                tags: [seshat_table_retail_store_sales]
          - not_null:
              config:
                tags: [seshat_table_retail_store_sales]
      - name: transaction_id
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.transaction_id]
        data_tests:
          - unique:
              config:
                tags: [seshat_table_retail_store_sales]
          - not_null:
              config:
                tags: [seshat_table_retail_store_sales]
      - name: discount_applied
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.discount_applied]
      - name: customer_sk
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.customer_id]
        data_tests:
          - relationships:
              arguments:
                to: "{{ ref('dim_customer_rss') }}"
                field: customer_sk
              config:
                tags: [seshat_table_retail_store_sales]
      - name: product_sk
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.item]
        data_tests:
          - relationships:
              arguments:
                to: "{{ ref('dim_product_rss') }}"
                field: product_sk
              config:
                tags: [seshat_table_retail_store_sales]
      - name: payment_method_sk
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.payment_method]
        data_tests:
          - relationships:
              arguments:
                to: "{{ ref('dim_payment_method_rss') }}"
                field: payment_method_sk
              config:
                tags: [seshat_table_retail_store_sales]
      - name: location_sk
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.location]
        data_tests:
          - relationships:
              arguments:
                to: "{{ ref('dim_location_rss') }}"
                field: location_sk
              config:
                tags: [seshat_table_retail_store_sales]
      - name: date_sk
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.transaction_date]
        data_tests:
          - not_null:
              config:
                tags: [seshat_table_retail_store_sales]
          - relationships:
              arguments:
                to: "{{ ref('dim_date_rss') }}"
                field: date_sk
              config:
                tags: [seshat_table_retail_store_sales]
      - name: price_per_unit
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.price_per_unit]
      - name: quantity
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.quantity]
      - name: total_spent
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.total_spent]
