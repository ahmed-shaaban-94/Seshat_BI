        source_map_revision: d679ae199f588c8dc96c2396a7f6877f2ca70c6e
        grain: one row per governed payment method member
        business_key: [payment_method]
        authority: derived
    columns:
      - name: payment_method_sk
        meta:
          seshat:
            derivation: surrogate_key
