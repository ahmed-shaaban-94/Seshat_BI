    columns:
      - name: location_sk
        meta:
          seshat:
            derivation: surrogate_key
        data_tests:
          - unique:
              config:
                tags: [seshat_table_retail_store_sales]
          - not_null:
              config:
                tags: [seshat_table_retail_store_sales]
      - name: location
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.location]

  - name: dim_date_rss
    config:
      tags: [seshat_table_retail_store_sales]
    meta:
      seshat:
        table_id: retail_store_sales
        source_map: mappings/retail_store_sales/source-map.yaml
        source_map_revision: d679ae199f588c8dc96c2396a7f6877f2ca70c6e
