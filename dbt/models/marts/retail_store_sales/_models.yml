version: 2

models:
  - name: dim_customer_rss
    config:
      tags: [seshat_table_retail_store_sales]
    meta:
      seshat:
        table_id: retail_store_sales
        source_map: mappings/retail_store_sales/source-map.yaml
        source_map_revision: d679ae199f588c8dc96c2396a7f6877f2ca70c6e
        grain: one row per governed customer member
        business_key: [customer_id]
        authority: derived
    columns:
      - name: customer_sk
        meta:
          seshat:
            derivation: surrogate_key
        data_tests:
          - unique:
              config:
                tags: [seshat_table_retail_store_sales]
          - not_null:
              config:
                tags: [seshat_table_retail_store_sales]
      - name: customer_id
        meta:
          seshat:
            source_columns: [bronze.retail_store_sales.customer_id]

  - name: dim_product_rss
    config:
