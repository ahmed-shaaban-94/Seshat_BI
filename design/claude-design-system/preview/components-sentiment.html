<!doctype html>
<!-- @dsCard group="Components" name="Components · Sentiment chips" subtitle="Success, warning, danger, neutral — color + icon + label" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="col" style="gap:14px">
  <div class="eyebrow">Sentiment · color is paired with an icon + label (sec 3.6)</div>
  <!-- Chip text uses the darker emphasis shades so 11px label text clears WCAG AA
       body (4.5:1) on each soft background: success 5.83, warning 4.97, danger 7.07,
       neutral 8.84. The chip dot keeps the brighter hue as the color cue. -->
  <div class="row" style="gap:10px;flex-wrap:wrap">
    <span class="chip" style="background:#E7F2EC;color:#176944"><span class="chip-dot" style="background:#2E7D5B"></span>On target</span>
    <span class="chip" style="background:#F7EEDB;color:#8F5B00"><span class="chip-dot" style="background:#B5832A"></span>Watch</span>
    <span class="chip" style="background:#F6E4E4;color:#8E2329"><span class="chip-dot" style="background:#B23A3A"></span>Off target</span>
    <span class="chip" style="background:#EEF1F4;color:#3C434B"><span class="chip-dot" style="background:#6B7480"></span>No change</span>
  </div>
</div>
</body></html>
