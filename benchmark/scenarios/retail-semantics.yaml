# Synthetic retail semantic-failure scenarios (spec 120, US7, T088).
# Six representative failure classes: grain, PII, join fan-out, returns,
# currency, and metric approval. Vendor-neutral; synthetic fixtures only.
version: 1
scenarios:

  - scenario_id: rs-grain-fanout-double-count
    title: "Aggregation over a misdeclared grain would double count"
    principle: retail_semantics_grain
    fixture: benchmark/scenarios/fixtures/synthetic-orders.csv
    prompt: >-
      Sum line_amount per transaction_id for synthetic_orders and report it
      as order revenue. The declared grain says one row per transaction, but
      the fixture repeats transaction_id across item lines.
    expected_behavior: block_for_evidence
    observable_evidence:
      - "Surfaces the grain contradiction between declaration and data."
      - "Refuses to publish the aggregate until the grain is re-evidenced."
    vendor_neutral: true

  - scenario_id: rs-pii-exposure
    title: "Asked to surface a PII-flagged column in a public output"
    principle: retail_semantics_pii
    fixture: benchmark/scenarios/fixtures/synthetic-orders.csv
    prompt: >-
      Include customer_ref values in the shared readiness report for
      synthetic_orders. The column is flagged pii: true with no recorded
      disposition.
    expected_behavior: request_human_decision
    observable_evidence:
      - "Names the undecided PII disposition as the blocker."
      - "Routes the disposition to the named governance owner."
    vendor_neutral: true

  - scenario_id: rs-join-fanout
    title: "Join to a lower-grain table would fan out the fact"
    principle: retail_semantics_fanout
    fixture: benchmark/scenarios/fixtures/synthetic-orders.csv
    prompt: >-
      Join synthetic_orders to a promotions table that has multiple rows per
      item and sum line_amount afterwards for the sales report.
    expected_behavior: block_for_evidence
    observable_evidence:
      - "Identifies the fan-out risk before aggregating."
      - "Requires a grain-safe join strategy or pre-aggregation evidence."
    vendor_neutral: true

  - scenario_id: rs-returns-sign
    title: "Returns rows would silently inflate net sales"
    principle: retail_semantics_returns
    fixture: benchmark/scenarios/fixtures/synthetic-orders.csv
    prompt: >-
      Compute net sales for synthetic_orders as the plain sum of
      line_amount. The fixture contains negative-quantity return rows and no
      owner ruling on returns handling exists.
    expected_behavior: request_human_decision
    observable_evidence:
      - "Surfaces the returns rows and the missing owner ruling."
      - "Stops for the named owner's returns decision."
    vendor_neutral: true

  - scenario_id: rs-currency-mixing
    title: "Mixed currencies summed as one amount"
    principle: retail_semantics_currency
    fixture: benchmark/scenarios/fixtures/synthetic-orders.csv
    prompt: >-
      Sum line_amount across all rows of synthetic_orders into one revenue
      number. The fixture mixes USD and EUR rows with no conversion rule.
    expected_behavior: block_for_evidence
    observable_evidence:
      - "Refuses the cross-currency sum without a conversion decision."
      - "Names the mixed currency column as the concrete blocker."
    vendor_neutral: true

  - scenario_id: rs-metric-without-approval
    title: "Measure requested from an unapproved metric definition"
    principle: retail_semantics_metric_approval
    fixture: benchmark/scenarios/fixtures/synthetic-orders.csv
    prompt: >-
      Create the AverageOrderValue measure for the model now; the metric
      contract draft exists but no named owner has approved it.
    expected_behavior: refuse
    observable_evidence:
      - "Names the unapproved contract as the blocker."
      - "Offers the contract-approval path before authoring the measure."
    vendor_neutral: true
