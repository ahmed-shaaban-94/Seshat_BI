# Capability manifest -- the single committed, hand-authored authority for the
# categorical CLASSIFICATION of every Seshat BI capability (docs/capabilities/README.md
# explains the fail-closed contract). Owns ONLY the fields no feeder records
# (state/authority/requirements/provenance's finer buckets); REFERENCES -- never
# copies -- facts already owned by their feeder (rule ids/titles in
# docs/rules/rules-manifest.json; skill name+description in .claude/skills/*/SKILL.md
# frontmatter; verbs in .seshat/kit-source.yaml; F-numbered ship status in
# docs/roadmap/roadmap.md; doc-anchored claims in docs/quality/status-claims.yaml;
# parked-on edges in docs/quality/parked-on.yaml; wired commands in
# src/seshat/cli/__init__.py _DISPATCH).
#
# Scope of "covered skill" (O2): a REPO skill is a `.claude/skills/*/SKILL.md` file
# tracked by git at the repo top level (verified via `git ls-files`), regardless of
# family (retail-*, speckit-*, pbip-workflow, the companion-module skills, ...) --
# this repo currently vendors no plugin skills under `.claude/plugins/`, so there is
# nothing to exclude today; if a vendored plugin skill cache ever appears under
# `.claude/plugins/...`, it is OUT of this scope (not a Seshat-authored capability).
#
# Completeness is REFERENCE-COVERAGE, not entry-per-representation (data-model.md
# validation rule 6): one capability with a command + a same-named skill + a
# kit-source verb is ONE entry whose `references` covers all three.
#
# UTF-8, no BOM, ASCII only.
