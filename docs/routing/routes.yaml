# Route registry — machine-checkable knowledge-routing manifest (A1)
#
# This file makes the two-hop routing contract VERIFIABLE. Each route mirrors a
# row of `docs/knowledge-map.md` "Route by task" (and the COMPASS fast-routing
# table). The A1 rule (`src/retail/rules/routes.py`) reads this manifest and
# fails the gate when a route's contract is broken.
#
# Contract per route:
#   id      — the knowledge-map task number (stable handle).
#   task    — the task label, copied from the knowledge map (human reference).
#   targets — the repo-relative POSIX path(s) the route opens first. A two-hop
#             knowledge route lists its SKILL.md then INDEX.md.
#   status  — built | planned.
#               built   -> EVERY target must be a tracked file.
#               planned -> the target is deferred; NO target may resolve yet
#                          (a resolving "planned" target is a stale marker).
#
# This manifest resolves references only. It NEVER executes anything: A1 is a
# read-only static check, consistent with the "knowledge/reasoning layers never
# execute" invariant.
#
# When you add, move, or build a routed file, update the matching route here in
# the SAME change — the A1 gate is the guard that keeps routing honest.

