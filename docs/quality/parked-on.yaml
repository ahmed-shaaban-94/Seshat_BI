# Parked-on dependency-edge manifest -- the source DF1
# (src/seshat/rules/parked_on.py) reconciles against tracked-file evidence. Each edge
# records that a feature is PARKED ON a shared blocker (F016, the gated Power BI
# execution adapter), so the gate fails closed when an edge drifts from reality:
#   - the cited blocker/evidence is missing or untracked, or
#   - the anchor sentence asserting the park is no longer in the citing doc, or
#   - the park is contradicted because the target has shipped (an OPTIONAL
#     shipped_when_tracked path is now a tracked file).
#
# Each edge:
#   id                   stable handle (named in findings)
#   blocked              the parked feature/work item (generic label)
#   parked_on            the shared blocker it waits on (e.g. "F016")
#   doc                  the doc asserting the park (must be a tracked file)
#   anchor               the LITERAL sentence in `doc` asserting the park; DF1
#                        verifies this text is present (a moved/removed sentence is
#                        itself flagged). Must stay byte-identical to the doc wording.
#   evidence             a tracked deferred-spec/record file documenting the park
#   shipped_when_tracked OPTIONAL -- if this path becomes a tracked file the target
#                        has shipped and a still-asserted park is contradicted (ERROR).
#                        Omitted here: no v1 edge has a machine-checkable ship signal yet.
#
# Hand-curated (not auto-generated). v1 scope = the F016 bottleneck cluster only.
# Generic kit-feature edges only -- no worked-example domain facts.

