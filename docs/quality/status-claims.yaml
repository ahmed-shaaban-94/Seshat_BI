# Status-claims manifest -- the single source SC1 (src/retail/rules/status_claims.py)
# reconciles against tracked-file evidence. Each entry records a PROSE status claim a
# governance/status doc makes, so the gate fails closed when the claim drifts from
# reality (a "planned" marker on something that shipped, or a "built" claim for a
# missing artifact).
#
# Each claim:
#   id                stable handle for the claim (named in findings)
#   doc               the doc making the claim (must be a tracked file)
#   anchor            the LITERAL sentence in `doc` that asserts the claim; SC1
#                     verifies this text is present so a moved/removed sentence is
#                     itself flagged. Must stay byte-identical to the doc wording.
#   claimed-artifact  the artifact the claim is about (tracked => exists)
#   claimed-status    built  -> claimed-artifact MUST be tracked (else false-built ERROR)
#                     planned-> claimed-artifact must NOT be tracked (else stale ERROR)
#
# This manifest is hand-curated (not auto-generated); add an entry when a doc makes a
# checkable status claim worth locking against drift.

claims:
  - id: "capability-state-net-sales-trace"
    doc: "docs/quality/post-idea-bank-capability-state.md"
    anchor: "(`docs/demo/net-sales-end-to-end-readiness-trace.md`, shipped)"
    claimed-artifact: "docs/demo/net-sales-end-to-end-readiness-trace.md"
    claimed-status: "built"

  # first-hour-compass surfaces two worked examples as first-arrival reference
  # patterns; SC1 locks those file references so the skill can never point at a
  # deleted/renamed example (nor can the anchoring table row silently move).
  # (076 extraction) the c086-pharmacy worked example was archived out of the
  # product as client data; first-hour-compass now offers only retail-store-sales
  # (the Kaggle public example). The c086 claim is removed; the store-sales claim
  # below remains the single locked worked-example reference.
  - id: "first-hour-compass-worked-example-store-sales"
    doc: ".claude/skills/first-hour-compass/SKILL.md"
    anchor: "| `docs/worked-examples/retail-store-sales.md` | The **full seven-stage spine** to Dashboard Ready -- metric contracts, governed model, dashboard design, handoff (on the public Kaggle retail-store-sales dataset) |"
    claimed-artifact: "docs/worked-examples/retail-store-sales.md"
    claimed-status: "built"
  # The usage/boundary doc also names both examples in its first-arrival section;
  # lock those references too so the doc and skill cannot drift apart or dangle.
  - id: "first-hour-compass-doc-worked-example-store-sales"
    doc: "docs/tools/first-hour-compass.md"
    anchor: "`docs/worked-examples/retail-store-sales.md` (the full seven-stage spine to Dashboard Ready --"
    claimed-artifact: "docs/worked-examples/retail-store-sales.md"
    claimed-status: "built"

  # (I2) The bi-python groupby/grain knowledge slice landed: its INDEX route moved
  # planned -> live. Lock the live route reference so the INDEX can never point at a
  # deleted/renamed knowledge file, nor silently regress the route to "planned".
  - id: "bi-python-groupby-knowledge-built"
    doc: "skills/bi-python-knowledge/INDEX.md"
    anchor: "| Aggregate / groupby at a correct grain (use the checklist as a standalone review artifact) | `knowledge/groupby-aggregation-and-grain.md` | `checklists/aggregation-grain-checklist.md` |"
    claimed-artifact: "skills/bi-python-knowledge/knowledge/groupby-aggregation-and-grain.md"
    claimed-status: "built"

  # (H4) The per-KPI contract-sufficiency card template landed and is referenced from
  # the KPI catalog "See also". Lock the reference so the catalog can never point at a
  # deleted/renamed template.
  - id: "kpi-sufficiency-card-template-built"
    doc: "docs/metrics/retail-kpi-catalog.md"
    anchor: "`../../templates/kpi-sufficiency-card.md` (categorical `ready`/`blocked` + named"
    claimed-artifact: "templates/kpi-sufficiency-card.md"
    claimed-status: "built"
