# Shipped-ideas ledger -- the structured memory seam (IL1) the idea-engine's Memory
# stage reads as authoritative known-history, so it stops re-pitching shipped ideas and
# stops re-litigating settled rejections.
#
# HUMAN-CURATED (like docs/quality/status-claims.yaml and parked-on.yaml). The engine
# only READS this file -- it never appends, never writes the roadmap, and never re-reads
# git from it. Ground remains the single owner of live git-derived ship-status; this
# ledger is the curated record of what a human has already shipped or settled.
#
# This sits ALONGSIDE the prose "## SHIPPED / SETTLED" appendix in idea-backlog.md. On a
# conflict, this structured file is authoritative for the engine's machine read and the
# disagreement is surfaced as a memory-integrity signal (never silently rewritten).
#
# Each key is the idea's backlog short-code. Each value has EXACTLY:
#   status  : "shipped" | "settled"
#   pr_sha  : non-empty PR-number and/or commit-SHA evidence string
#   f_row   : a roadmap F-row label (e.g. "F062") or the literal "none"
# Generic governance identifiers only -- never sample data, metric values, or
# worked-example domain specifics. This ledger RECORDS an f_row only when a human already placed
# one; it NEVER assigns a roadmap F-row (the idea bank is not a roadmap; Principle V).
#
# Design-layer ships (G1, spec-dir 066): a design-foundation idea
# (strengthens_layer = design-system) that ships reuses this EXACT
# { status, pr_sha, f_row } shape unchanged -- no design/layer field is added, so the
# IL1 ledger-contract guard is untouched. No design entry is recorded now: no
# design-foundation idea has shipped yet, and this file stays human-curated /
# engine-read-only, so a row is added only when a human records a real ship.

