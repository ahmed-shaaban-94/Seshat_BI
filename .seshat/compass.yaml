# GENERATED by retail init (compass projection of .seshat/kit-source.yaml).
# Do not edit by hand -- edit kit-source.yaml and re-run `retail init`.
# Harness-neutral kit router. Stores NO run-state / current_stage (FR-005).
kit: seshat-bi
version: 0.2.0
orient:
  question_first: What readiness stage am I serving?
  state_lives_in: readiness-status.yaml (per TABLE, recomputed)
  recompute_from:
  - committed artifacts
  - Gate status
  - migration presence
verbs:
- id: retail-orchestrate
  purpose: conductor -- sequence the medallion verbs, self-heal against the gate
- id: first-hour-compass
  purpose: first-arrival worked-example offer + single-source seam list + single-table orientation card
- id: retail-onboard-table
  purpose: Source->Mapping front door; owns the Stage-1 read-only DB-backed profile (grain candidates, column types)
- id: retail-discover-portfolio
  purpose: metadata-only portfolio discovery -> governed domain/scope proposals -> selected-table onboarding -> interview handoff
- id: business-knowledge-interview
  purpose: after DB discovery, interview the owner into the Decision Store (batch low-risk, explicit critical); records decisions, never self-grants approval
- id: source-mapping
  purpose: the mapping gate -- produces source-map.yaml
- id: kpi-contract-builder
  purpose: 'drive the shipped kpi_contracts engine: assess answerability, list the decisions to approve, preview with per-field provenance, then draft/finalize -- never self-grants approval'
- id: retail-build-warehouse
  purpose: author silver/gold SQL; stop before executing
- id: retail-validate
  purpose: live checks; needs db extra + DSN, else [PENDING LIVE PROFILE]
- id: retail-govern
  purpose: static check (seshat check)
hard_stops:
- never_self_grant_approval
- no_silver_before_mapping_cleared
- no_dashboard_before_metric_contracts
- never_fabricate_a_confidence_score
integrations:
- claude
- codex
