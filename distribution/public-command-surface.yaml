# Canonical public command surface -- the single authority for what the
# generated agent bundles advertise.
#
# Scope: agent-platform surfaces only (Claude Code slash commands and the
# bundled, discoverable skills both platforms ship). CLI verbs remain owned by
# `src/seshat/cli/__init__.py` (`_DISPATCH`) and are classified in
# `docs/capabilities/capabilities.yaml`; entries here may REFERENCE a CLI verb
# but never define one.
#
# Naming convention: core readiness commands use the bare verb name (the
# Claude namespace already reads `/seshat-bi:<name>`, so a `seshat-` prefix is
# redundant); Power BI commands carry the `powerbi-` domain prefix. The four
# names the v0.2.0 external acceptance pass validated survive as deprecated
# aliases in `command_aliases` for one release cycle.
#
# Reconciled by `tests/contract/test_public_command_surface.py` and consumed by
# `scripts/external_agent_acceptance.py` (expected bundled-skill set). Every
# shipped command must have a reviewed wrapper template, an allowlist entry
# (`distribution/public-knowledge-allowlist.yaml`), and a generated bundle
# file; a `deferred`/`internal` entry must have none. Adding a command here
# without shipping its wrapper -- or shipping a wrapper absent from here --
# fails the contract tests.
schema_version: 1
canonical_repository: Kemetra/Seshat-BI
