version: 1
capabilities:

  - id: fixture-available-now
    name: "Fixture available-now capability"
    summary: "A shipped, agent-runnable CLI capability with no requirement."
    state: shipped
    authority: agent-runnable
    surface: cli
    requirements: []
    provenance: locally-verified
    readiness_stage: not-stage-scoped
    command: "check"
    documentation: "docs/capabilities/README.md"
    references:
      dispatch: "check"

  - id: fixture-requires-db
    name: "Fixture DB-requiring capability"
    summary: "A shipped, agent-runnable CLI capability that needs a database."
    state: shipped
    authority: agent-runnable
    surface: cli
    requirements: [database]
    provenance: locally-verified
    readiness_stage: gold_ready
    command: "validate"
    documentation: "docs/capabilities/README.md"
    references:
      dispatch: "validate"

  - id: fixture-companion-skill
