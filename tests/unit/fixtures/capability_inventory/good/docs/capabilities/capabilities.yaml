    authority: advisory
    surface: skill
    requirements: []
    provenance: locally-verified
    readiness_stage: not-stage-scoped
    command: null
    documentation: ".claude/skills/fake-skill/SKILL.md"
    references:
      skill: "fake-skill"
      verb: "fixture-verb"
      roadmap: "F900"

  - id: fixture-human-gated
    name: "Fixture human-gated capability"
