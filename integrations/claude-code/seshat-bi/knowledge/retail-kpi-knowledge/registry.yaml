# The authoritative product-level KPI inventory. Entries contain generic concepts
# only; project decisions, physical bindings, and project contracts live elsewhere.
version: 1

drift_reconciliations:
  - id: seed-count
    conflicting_files:
      - skills/retail-kpi-knowledge/SKILL.md
      - skills/retail-kpi-knowledge/INDEX.md
      - skills/retail-kpi-knowledge/README.md
    resolution: Routes now name their individual lifecycle; this registry is the only machine-readable inventory.
  - id: net-sales-growth-lifecycle
    conflicting_files:
      - skills/retail-kpi-knowledge/README.md
      - skills/retail-kpi-knowledge/packs/sales-performance-pack.md
      - skills/retail-kpi-knowledge/packs/mvp-retail-kpi-pack.md
      - skills/retail-kpi-knowledge/patterns/metric-contract-candidates.json
    resolution: KPI-MC-11 is seeded because its generic knowledge contract exists; its comparison basis remains a project owner policy.
  - id: ytd-net-sales-lifecycle
    conflicting_files:
      - skills/retail-kpi-knowledge/README.md
      - skills/retail-kpi-knowledge/packs/sales-performance-pack.md
      - skills/retail-kpi-knowledge/packs/mvp-retail-kpi-pack.md
      - skills/retail-kpi-knowledge/patterns/metric-contract-candidates.json
    resolution: KPI-MC-13 is seeded because its generic knowledge contract exists; year boundary remains a project owner policy.
  - id: same-store-lifecycle
    conflicting_files:
      - skills/retail-kpi-knowledge/patterns/metric-contract-candidates.json
    resolution: KPI-MC-12 is planned until the comparable-store and comparison policies are approved.
  - id: scorecard-dash-style
    conflicting_files:
      - skills/retail-kpi-knowledge/references/kpi-coverage-scorecard-template.md
      - src/seshat/rules/scorecard.py
    resolution: Owner-flagged cosmetic drift; the template keeps its shipped em dash while SL1 accepts ASCII double hyphen output.

