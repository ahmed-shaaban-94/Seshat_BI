# Seshat BI public extension-pack registry (spec 128).
#
# A reviewed, version-controlled STATIC registry: tracked repository text,
# no hosted marketplace, no dynamic index endpoint (Principle VIII). Every
# record describes METADATA ABOUT a pack -- id, version, category, author,
# source, compatibility, content hash, dependencies, conflicts, and a
# categorical verification_state -- distinct from the pack's own manifest
# (seshat-pack.yaml), which stays governed by the unchanged extension-pack
# schema and validator.
#
# `verification_state: reviewed` is set ONLY by a named human reviewer
# committing an edit to this file (never by the catalog tool at runtime;
# hard-stop never_self_grant_approval). It is never a score, rank, or
# percentage (hard-stop never_fabricate_a_confidence_score).
#
# Recorded `hash` values are the SHA-256 digest `seshat.packs.catalog
# .content_digest` computes over the full pack directory (every file's
# relative path + bytes, sorted). Recompute with:
#   python -c "from seshat.packs.catalog import content_digest; \
#     print(content_digest('<pack-directory>'))"
schema_version: "1.0"
records:
  - id: seshat.reference.kpi-basic
    version: "1.0.0"
    category: kpi
    author: "Seshat BI maintainers"
    source: packs/reference/kpi-basic
    compatibility: "1.x"
    hash: 1d29121861da63cc3758e258ca31b740cead5562f323633f6b70fbe319cc89d6
    dependencies: []
    conflicts: []
    verification_state: reviewed
    verification_evidence:
