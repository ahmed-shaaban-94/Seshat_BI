name: dep-integrity

# Spec 136: the network-dependent dependency-integrity checks live in their OWN
# workflow, deliberately SEPARATE from the offline stdlib-only `seshat check`
# core in ci.yml (Principle VIII). Nothing here installs an optional extra into
# the job interpreter -- every resolve happens in a per-environment ephemeral
# venv via `pip install --dry-run --report`, so the lazy-import isolation proof
# (SC-002) is untouched.

permissions: {}

on:
  # pull_request (not bare push): the gate's question is "does the PR's MERGED
  # result resolve" -- the pull_request merge ref answers exactly that, while a
  # bare-push run resolves the branch tree alone and red-flags a PR whose
  # conflict is already fixed on main (seen live: the pre-spec-135 branch tree
  # reproduced the historical incident on push while the merge ref resolved).
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, mirroring the Dependabot cadence -- drives the advisory freshness
    # report (the co-resolution gate also runs, harmlessly, on the schedule).
    - cron: "17 6 * * 1"

jobs:
  co-resolution:
    # The fail-closed co-resolution proof (US1). Resolves every declared
    # environment and cross-product in dependency-environments.yaml.
    #
    # HISTORICAL-INCIDENT NOTE (SC-001): while spec 135 (PR #307) is unmerged,
    # the orchestration project still pins dagster-dbt==0.29.14 (dbt-core<1.12)
    # while the root `dbt` extra pins dbt-core==1.12.0, so the
    # `root-dbt-plus-orchestration` cross-product genuinely FAILS to resolve
    # (ResolutionImpossible). That failure IS the proof the gate works -- it is
    # the historical incident reproducing, not a gate defect. The job's stdout
    # names the failing cross-product and prints the resolver's own text. This
    # job goes green only after PR #307 merges and the cross-product resolves;
    # the gate is never weakened and the cross-product is never dropped to force
    # a local pass.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      # No `pip install -e .` and NO optional extra installed into THIS
      # interpreter (SC-002). pip is upgraded so the resolver is current, and
      # pyyaml (the repo's ONE runtime dependency, needed to read the manifest)
      # is installed -- it is not an optional extra, so the lazy-import
      # isolation proof is untouched. Every declared resolve still runs in its
      # own ephemeral venv.
      - name: Upgrade pip and install the manifest reader dependency
        run: python -m pip install --upgrade pip pyyaml
      - name: Co-resolution gate (fail-closed)
        run: python scripts/dep_coresolve.py --check

  freshness:
    # The advisory freshness report (US2). Proposes latest-stable bumps of
    # governed pins, each with a solve-proof; it CHANGES NO pin and opens NO PR
    # (FR-008/FR-012). Runs on the weekly schedule + on demand; the report is a
    # CI artifact (FR-011). It is NEVER merge-blocking -- the job always exits 0.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Upgrade pip and install the manifest reader dependency
        run: python -m pip install --upgrade pip pyyaml
      - name: Advisory freshness report
        run: python scripts/dep_coresolve.py --freshness --out freshness-report.json
      - name: Upload freshness report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: freshness-report
          path: |
            freshness-report.json
            freshness-report.md
      - name: Advisory PR comment (opt-in, off by default)
        # OFF BY DEFAULT (mirrors the ci.yml POST_FRIENDLY_PR_SUMMARY pattern):
        # a repository that has not set the repo-level Actions variable
        # POST_DEP_FRESHNESS_COMMENT to "true" sees NO comment posted. The
        # comment is advisory only and NEVER merge-blocking (FR-011). It is
        # posted only when a freshness run coincides with an open PR context;
        # on the weekly schedule there is no PR to comment on, so this step is
        # a no-op there.
        if: >-
          vars.POST_DEP_FRESHNESS_COMMENT == 'true' &&
          github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Freshness comment posting is opt-in and advisory only."
          echo "See freshness-report.md (uploaded as an artifact) for the proposals."
