name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: `retail check` runs git-metadata rules (P2 scans the
          # commit-message BASE..HEAD range; C2/G1/G2 read git ls-files /
          # check-ignore). A shallow clone would make those mis-scan or error.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: Unit tests
        run: pytest -m unit

      - name: Retail governance check
        # Scope P2's commit-message check to THIS branch's commits, not an
        # arbitrary HEAD~20 window: range = merge-base(origin/main, HEAD)..HEAD.
        # This makes the gate STABLE regardless of HEAD position (aged-out history
        # never re-enters the window). fetch-depth: 0 (above) provides origin/main
        # for merge-base. If the base cannot be determined, fall back to a bare
        # `retail check` so CI never hard-errors on a bad range.
        #
        # NOTE: on a feature branch this WILL flag any non-conforming historical
        # subjects in range (e.g. grandfathered `test:` commits). That is correct
        # and honest — they collapse into one conforming commit on squash-merge to
        # main, at which point this gate is clean. We do not hide them.
        run: |
          git fetch origin main 2>/dev/null || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "")
          if [ -n "$BASE" ]; then
            retail check --commit-range "$BASE..HEAD"
          else
            retail check
          fi

      - name: Retail semantic-check (L3 contract<->DAX drift)
        # Separate step from `retail check` (above): the static check core is
        # stdlib-only and must never import yaml. `retail semantic-check` parses
        # metric-contract YAML (pyyaml, already installed via the [dev] extra) to
        # gate the contract<->DAX denominator drift class (drift => exit 1). No
        # --commit-range: it reads committed TMDL + contracts, not git diffs.
        run: retail semantic-check --repo .

      - name: Retail kit-lint (compass projection drift)
        # Separate step (feature 072): like semantic-check, this parses yaml
        # (.seshat/kit-source.yaml) so it stays OUT of the stdlib-only `retail check`
        # core. Fails loud (exit 1) when a compass projection -- .seshat/compass.yaml
        # or the fenced SESHAT-KIT regions of AGENTS.md/CLAUDE.md -- drifts from the
        # canonical source (i.e. someone edited the source but forgot `retail init`).
        # Read-only; reads no constitution. On an un-bootstrapped repo it exits 0.
        run: retail kit-lint --repo .

  smoke:
    # Windows is the release gate for the first-success journey. The test builds both
    # package artifacts, installs the wheel with pipx in a throwaway location, then
    # exercises seshat help/init-project/status/next/check with no optional extras.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install smoke harness tools
        run: python -m pip install build pipx
      - name: Windows first-success smoke
        run: python scripts/install_smoke_test.py

  smoke-unix:
    # Best-effort beta coverage for the documented macOS/Linux journey. It is kept
    # non-blocking by design; Windows remains the release gate.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install smoke harness tools
        run: python -m pip install build pipx
      - name: Best-effort first-success smoke
        run: python scripts/install_smoke_test.py