name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      acceptance_mode:
        description: Credential-free bundle validation or fixture classification
        required: true
        default: classify-fixtures
        type: choice
        options:
          - classify-fixtures
          - validate-bundles

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: `retail check` runs git-metadata rules (P2 scans the
          # commit-message BASE..HEAD range; C2/G1/G2 read git ls-files /
          # check-ignore). A shallow clone would make those mis-scan or error.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check src tests scripts

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Unit tests
        run: pytest -m unit

      - name: Public distribution contract tests
        # Explicit blocking gate for version/evidence/export contract behavior.
        # The repository may truthfully report a candidate as blocked before an
        # owner-approved version projection; these tests verify that fail-closed
        # behavior without consuming credentials or publishing anything.
        run: >-
          pytest
          tests/contract/test_public_knowledge_allowlist.py
          tests/contract/test_generated_agent_bundles.py
          tests/contract/test_release_version_sync.py
          tests/contract/test_release_evidence_models.py

      - name: Generated agent bundle drift
        run: python scripts/export_agent_bundles.py --check

      - name: Credential-free release candidate audit
        # Blocks structural regressions while truthfully allowing the report to
        # retain owner/version/publication blockers before release authorization.
        run: python scripts/release_candidate_audit.py --repository-check

      - name: Retail governance check
        # Scope P2's commit-message check to THIS branch's commits, not an
        # arbitrary HEAD~20 window: range = merge-base(origin/main, HEAD)..HEAD.
        # This makes the gate STABLE regardless of HEAD position (aged-out history
        # never re-enters the window). fetch-depth: 0 (above) provides origin/main
        # for merge-base. If the base cannot be determined, fall back to a bare
        # `retail check` so CI never hard-errors on a bad range.
        #
        # NOTE: on a feature branch this WILL flag any non-conforming historical
        # subjects in range (e.g. grandfathered `test:` commits). That is correct
        # and honest — they collapse into one conforming commit on squash-merge to
        # main, at which point this gate is clean. We do not hide them.
        run: |
          git fetch origin main 2>/dev/null || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "")
          if [ -n "$BASE" ]; then
            retail check --commit-range "$BASE..HEAD"
          else
            retail check
          fi

      - name: Friendly PR summary (opt-in, off by default)
        # Feature 130 (Friendly PR Reviewer) -- a plain-language PRESENTATION
        # layer over the review envelope `retail check --format review`
        # already produces (spec 130; src/seshat/pr_summary.py). It is NOT a
        # new gate and NOT a merge-safety verdict -- that verdict stays owned
        # by the shipped `pr-readiness-reviewer` skill (F025); this step adds
        # no `retail check` rule and changes no rule's behavior.
        #
        # OFF BY DEFAULT: a repository that has not set the repo-level
        # Actions variable POST_FRIENDLY_PR_SUMMARY to "true" sees NO
        # behavior change here and NO comment posted (FR-015, SC-005).
        #
        # THIN WRAPPER, not the tested core: the deterministic renderer /
        # differ / masker / comment-composer (`render_summary`,
        # `classify_changes`, `mask`, `pick_next_action`, `compose_comment`,
        # `find_existing`) are unit-tested in tests/unit/test_pr_summary.py
        # with no network. `scripts/post_friendly_pr_summary.py` only (a)
        # re-runs the already-produced review in `--format review` (no new
        # analysis), (b) calls those pure functions, and (c) posts/updates
        # ONE sticky comment via the runner's own `gh` CLI + GITHUB_TOKEN --
        # update-in-place by the stable HTML-comment marker, never a second
        # comment (FR-014). It adds no new Python dependency: `pyyaml` is
        # already installed via the `[dev]` extra for the semantic-check /
        # kit-lint steps below.
        #
        # The base-branch temporal fingerprint diff (US2, NEW vs RESOLVED vs
        # pre-existing) is not wired into this CI step yet -- fetching a base
        # run is explicitly the wrapper's job, deferred here to keep this
        # step thin (see docs/tools/friendly-pr-reviewer.md); the summary
        # honestly states the distinction could not be determined.
        if: >-
          github.event_name == 'pull_request' &&
          vars.POST_FRIENDLY_PR_SUMMARY == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main 2>/dev/null || true
          BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "")
          if [ -n "$BASE" ]; then
            retail check --format review --commit-range "$BASE..HEAD" > review.json || true
          else
            retail check --format review > review.json || true
          fi
          python scripts/post_friendly_pr_summary.py \
            --review review.json \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}"

      - name: Retail semantic-check (L3 contract<->DAX drift)
        # Separate step from `retail check` (above): the static check core is
        # stdlib-only and must never import yaml. `retail semantic-check` parses
        # metric-contract YAML (pyyaml, already installed via the [dev] extra) to
        # gate the contract<->DAX denominator drift class (drift => exit 1). No
        # --commit-range: it reads committed TMDL + contracts, not git diffs.
        run: retail semantic-check --repo .

      - name: Retail kit-lint (compass projection drift)
        # Separate step (feature 072): like semantic-check, this parses yaml
        # (.seshat/kit-source.yaml) so it stays OUT of the stdlib-only `retail check`
        # core. Fails loud (exit 1) when a compass projection -- .seshat/compass.yaml
        # or the fenced SESHAT-KIT regions of AGENTS.md/CLAUDE.md -- drifts from the
        # canonical source (i.e. someone edited the source but forgot `retail init`).
        # Read-only; reads no constitution. On an un-bootstrapped repo it exits 0.
        run: retail kit-lint --repo .

  smoke:
    # Windows is the release gate for the first-success journey. The test builds both
    # package artifacts, installs the wheel with pipx in a throwaway location, then
    # exercises seshat help/init-project/status/next/check with no optional extras.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install smoke harness tools
        run: python -m pip install build pipx
      - name: Windows first-success smoke
        run: python scripts/install_smoke_test.py

  smoke-unix:
    # Best-effort beta coverage for the documented macOS/Linux journey. It is kept
    # non-blocking by design; Windows remains the release gate.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install smoke harness tools
        run: python -m pip install build pipx
      - name: Best-effort first-success smoke
        run: python scripts/install_smoke_test.py

  agent-distribution:
    # Credential-free structural and semantic classification. Real external
    # GitHub install/CLI/IDE observations remain a separately recorded owner
    # gate; this job neither authenticates nor claims public availability.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: claude-code
            client: cli
            transcript: tests/fixtures/public_distribution/claude/acceptance.pass.json
          - platform: codex
            client: cli
            transcript: tests/fixtures/public_distribution/codex/acceptance.cli.pass.json
          - platform: codex
            client: ide
            transcript: tests/fixtures/public_distribution/codex/acceptance.ide.pass.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Validate generated platform bundle
        run: >-
          python scripts/external_agent_acceptance.py
          --platform ${{ matrix.platform }}
          --client ${{ matrix.client }}
          --validate-bundle
      - name: Classify shared synthetic outcome
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.acceptance_mode == 'classify-fixtures' }}
        run: >-
          python scripts/external_agent_acceptance.py
          --platform ${{ matrix.platform }}
          --client ${{ matrix.client }}
          --transcript ${{ matrix.transcript }}
