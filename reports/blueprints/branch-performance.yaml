# =============================================================================
# branch-performance.yaml  --  a GENERIC starter page blueprint (surface 1)
# =============================================================================
# Tower BI Agent Kit  -  Power BI Visual Foundation (F011A, Layer 6 Dashboard).
# See: docs/powerbi/dashboard-blueprints.md (how a blueprint is read + the index
# this file is listed in) and templates/dashboard-page-blueprint.yaml (the copy-me
# blank this starter instantiates). The four-surface router that owns this surface
# is .claude/skills/powerbi-dashboard-design/SKILL.md.
#
# WHAT THIS IS
#   One of four GENERIC starter page blueprints in reports/blueprints/. It is the
#   durable design intent for ONE dashboard page: who it is for, the single
#   business question it answers, the upstream contracts/model it depends on, and
#   the sections + candidate visuals that fill it. It is a STARTER to copy and fill
#   for a specific subject area -- not a finished page, and not the report itself
#   (that is built later, F016).
#
# WHICH SURFACE THIS BELONGS TO  (route to exactly one; never blend)
#   Surface 1 -- report visuals. This blueprint carries NO background/canvas
#   structure (surface 2 -> templates/background-spec.yaml; referenced by path
#   below), NO theme defaults (surface 3 -> themes/tower-retail.theme.json;
#   referenced by path below), and NO implementation/handoff step (surface 4 ->
#   the powerbi-handoff workflow; F016 owns execution).
#
# THE CONTRACTS-FIRST GATE  (referenced, never re-defined here)
#   This page describes data-bound visuals, so it inherits the Dashboard Ready
#   gate: no data-bound dashboard design before the subject area's
#   semantic_model_ready is pass. A blueprint may be authored as GENERIC reference
#   (placeholders, no concrete metric) at any time -- this starter is exactly that
#   -- but a blueprint FILLED for a specific subject area is gated. This file does
#   NOT re-define the gate or self-grant a pass: the gate, the design-review
#   sign-off, and the dashboard_ready: pass are owned by
#   docs/readiness/dashboard-ready.md and the F011/012 dashboard-design verb.
#   readiness_dependencies (below) names the stage; it does not restate the rule.
#
# C086 IS AN EXAMPLE, NEVER INLINED HERE  (generic, roadmap rule 7)
#   The first subject area through this kit is C086 (a pharmacy sales table); its
#   filled values live ONLY in a per-subject-area working set, never in this
#   starter. Do NOT copy any C086/pharmacy specifics (billing codes, segment
#   rollups, insurance/PII columns, pharmacy grain keys, real branch names, real
#   measure names) into this file -- the values below are deliberately obvious
#   placeholders.
#
# SISTER STARTERS  (the four are read as a set; see the index doc)
#   reports/blueprints/executive-summary.yaml ......... executive / leadership
#   reports/blueprints/branch-performance.yaml ........ THIS FILE
#   reports/blueprints/product-mix.yaml ............... merchandising / category
#   reports/blueprints/data-quality-control-room.yaml . data steward / analyst
#
# AUTHORING NOTES
#   - Keep this YAML valid: it is read as a spec, not just prose. Quote any value
#     containing ':' or quotes.
#   - REFERENCE, never embed: name the metric contracts and the model/theme/
#     background by name/path; do not paste a formula, a DAX expression, a color
#     hex, or a theme value here. A blueprint that inlines a metric has crossed
#     into F009's territory; one that inlines theme colors has crossed into
#     surface 3.
#   - ASCII only, UTF-8 no BOM. Keep ids/paths SHORT (Windows 260-char PBIP path
#     limit; repo paths <= 200 chars). No real connection host or secret.
#   - This file carries NO PBIP/PBIR edit, NO DAX, NO SQL. The handoff stops at
#     NOTES; F016 owns any execution step (rule 6).
# =============================================================================

# -----------------------------------------------------------------------------
# page -- identity and intent. The business_question is decided FIRST: a page that
# answers two questions is two pages (a Principle V judgment call -- surface "which
# question does this page answer?" rather than blending several).
# -----------------------------------------------------------------------------
page_id: "branch_performance"          # short stable id for this starter page
audience: "regional / branch manager"  # who reads this page (describes the reader,
                                       #   invents no metric)
business_question: "How do locations (branches/stores) compare, and which are over- or under-performing?"
                                       # the ONE question this page answers (verbatim
                                       #   from docs/powerbi/dashboard-blueprints.md).
                                       #   A question, not a formula.

# -----------------------------------------------------------------------------
# readiness_dependencies -- the upstream stage(s) that must be `pass` before this
# page is FILLED for a specific subject area. Names the stage; does NOT restate the
# gate. The gate is owned by docs/readiness/dashboard-ready.md (rule 5).
# -----------------------------------------------------------------------------
readiness_dependencies:
  semantic_model_ready: "pass"         # required before data-bound design (F010, rule 5)
  metric_contracts_approved: true      # the contracts below must be approved (F009)
  gate_owner: "docs/readiness/dashboard-ready.md"   # this file reuses, never redefines

# -----------------------------------------------------------------------------
# required_metric_contracts -- REFERENCE BY NAME to approved metric contracts
# (F009). Placeholders only in this starter; never an inlined formula, DAX, or
# threshold. A candidate visual with no backing contract is an ORPHAN and MUST NOT
# be emitted -- record "orphan visual: no contract for <question>" instead.
# -----------------------------------------------------------------------------
required_metric_contracts:
  - name: "<metric_branch_sales>"      # NAME ONLY, e.g. a per-branch sales measure
    store_ref: "<path-or-id in the metric-contract store (F009)>"
    status_required: "pass"
  - name: "<metric_branch_target_or_prior>"   # the comparison the question needs
    store_ref: "<path-or-id in the metric-contract store (F009)>"
    status_required: "pass"
  # Add one entry per metric the page binds to. NO `formula:` / `dax:` field exists
  # here BY DESIGN -- the contract owns the definition (F009).

# -----------------------------------------------------------------------------
# required_semantic_model_contract -- REFERENCE the governed semantic model (F010)
# the visuals read fields from, by name/path. Never a copied relationship or column
# definition. Every candidate visual below names fields PRESENT in this model; a
# field not in the model is UNMAPPED -> record it as a blocking reason, do not
# design around it.
# -----------------------------------------------------------------------------
required_semantic_model_contract:
  name: "<governed_semantic_model_name>"
  model_ref: "<path-or-id of the governed model (F010)>"

# -----------------------------------------------------------------------------
# background_asset -- the static canvas behind this page, if any. REFERENCE BY PATH
# only -- the image is surface 2 (static STRUCTURE, never data: no KPI value, no
# dynamic title baked in). The live visuals below sit editable ABOVE it.
# -----------------------------------------------------------------------------
background_asset:
  spec: "templates/background-spec.yaml"   # the surface-2 spec a real asset fills
  asset_path: "design/backgrounds/<branch_performance_bg.png>"   # path only; none until exported
  none: false                          # set true if the page uses no static background

# -----------------------------------------------------------------------------
# theme_json -- the default palette/fonts/formatting for this page. REFERENCE BY
# PATH only -- the theme is surface 3 (DEFAULTS, never business meaning). Branch and
# category colors are assigned ONCE here (theme/tokens) and reused across every
# page; this blueprint never inlines a hex value (that would blend surface 1 into
# 3). See the consistent-colors note under candidate_visuals.
# -----------------------------------------------------------------------------
theme_json:
  path: "themes/tower-retail.theme.json"
  tokens_ref: "design/tokens/tower-retail-design-tokens.yaml"   # the seed the theme draws from

# -----------------------------------------------------------------------------
# canvas -- the page geometry. Layout intent only; the implementer (F016) realizes
# it. References the desktop 16:9 grid (with a phone layout noted under mobile).
# -----------------------------------------------------------------------------
canvas:
  size: "16:9"                         # desktop default
  grid: "design/grids/16x9-grid.yaml"  # the grid coordinates the visuals snap to

# -----------------------------------------------------------------------------
# sections -- the page laid out in the SHARED section vocabulary
# (docs/powerbi/dashboard-blueprints.md). A branch-comparison page leans on the
# KPI strip + main insight (the comparison) + diagnostic (the ranking) +
# exception-detail (the branch-level table); not every section is used.
# -----------------------------------------------------------------------------
sections:
  - name: "header"
    used: true
    holds: "page title, the period context, the 'branch manager' audience cue -- static structure, no live KPI baked into the background"
  - name: "kpi_strip"
    used: true
    holds: "a few headline KPIs at the network level (e.g. total across branches + count of branches above/below the comparison), each carrying a comparison vs prior period or target"
  - name: "main_insight"
    used: true
    holds: "the primary branch-COMPARISON visual that answers the page question (all branches side by side)"
  - name: "diagnostic"
    used: true
    holds: "the branch-RANKING visual (sorted, top/bottom) that explains which branches are over- or under-performing"
  - name: "exception_detail"
    used: true
    holds: "a per-branch table/matrix for the branches that need attention -- detail, not the executive headline"
  - name: "filter_rail"
    used: true
    holds: "slicers (period, region) kept to the side so they do not dominate the canvas"
  - name: "footer_status"
    used: true
    holds: "data-as-of and any data-quality flag -- never the page's main content"

# -----------------------------------------------------------------------------
# candidate_visuals -- the visuals proposed per section. Each data-bound visual
# REFERENCES one approved metric contract (by placeholder name) + a mapped
# semantic-model field; it inlines no formula. One file per visual when filled out
# in detail -> templates/visual-spec.yaml. The two load-bearing visuals for this
# page are the branch COMPARISON (main_insight) and the branch RANKING (diagnostic).
#
# CONSISTENT BRANCH/CATEGORY COLORS (FR-012; visual-qa "inconsistent category
# colors"): a branch keeps the SAME color on every visual and every page. Those
# colors are assigned ONCE in the theme/tokens (surface 3:
# themes/tower-retail.theme.json + design/tokens/tower-retail-design-tokens.yaml)
# and REUSED here -- this blueprint references that assignment and inlines no hex.
# -----------------------------------------------------------------------------
candidate_visuals:

  # (1) headline KPIs -- each carries a comparison (anti-pattern: KPI without one)
  - visual_id: "bp_kpi_network"
    section: "kpi_strip"
    visual_type: "kpi_card"
    business_question: "How is the branch network tracking vs prior period / target?"
    metric_contract: "<metric_branch_sales>"          # REFERENCE; comparison via <metric_branch_target_or_prior>
    semantic_model_fields:
      measures:
        - "<fact_table>.<branch_sales_measure>"       # mapped (F010)
      date_field: "<dim_date>.<date_field>"
    notes: "show value + comparison delta; no comparison -> anti-pattern"

  # (2) the branch COMPARISON -- the main insight (all branches side by side)
  - visual_id: "bp_branch_comparison"
    section: "main_insight"
    visual_type: "bar_chart"                           # or column_chart; one bar per branch
    business_question: "How do branches compare on the headline measure this period?"
    metric_contract: "<metric_branch_sales>"          # REFERENCE BY NAME
    semantic_model_fields:
      measures:
        - "<fact_table>.<branch_sales_measure>"
      dimensions:
        - "<dim_branch>.<branch_name_attribute>"      # one mark per branch (mapped)
      date_field: "<dim_date>.<date_field>"
    formatting:
      axis: "start at zero (bar/column charts)"
      category_colors: "from theme/tokens (consistent per branch across pages); no inline hex"

  # (3) the branch RANKING -- the diagnostic (which branches over/under-perform)
  - visual_id: "bp_branch_ranking"
    section: "diagnostic"
    visual_type: "bar_chart"                           # sorted; or a ranked table
    business_question: "Which branches are over- or under-performing vs the comparison?"
    metric_contract: "<metric_branch_sales>"          # REFERENCE; ranked vs <metric_branch_target_or_prior>
    semantic_model_fields:
      measures:
        - "<fact_table>.<branch_sales_measure>"
      dimensions:
        - "<dim_branch>.<branch_name_attribute>"
      date_field: "<dim_date>.<date_field>"
    sorting:
      by: "<branch_sales_measure>"                     # the displayed measure (mapped)
      direction: "desc"
      top_n: "<int or 'all'>"                          # limit for readability (e.g. top/bottom 10)
    formatting:
      category_colors: "from theme/tokens (consistent per branch); no inline hex"

  # (4) the per-branch detail -- exception_detail (a table is DETAIL, not the
  #     executive headline; table-as-main-executive-visual is an anti-pattern)
  - visual_id: "bp_branch_detail"
    section: "exception_detail"
    visual_type: "matrix"                              # branches x measures, detail only
    business_question: "What are the per-branch numbers for the branches that need attention?"
    metric_contract: "<metric_branch_sales>"          # REFERENCE BY NAME
    semantic_model_fields:
      measures:
        - "<fact_table>.<branch_sales_measure>"
      dimensions:
        - "<dim_branch>.<branch_name_attribute>"
        - "<dim_branch>.<region_attribute>"           # optional grouping (mapped)
      date_field: "<dim_date>.<date_field>"

  # (5) the slicers -- non-metric structural visuals (metric_contract.none: true)
  - visual_id: "bp_period_slicer"
    section: "filter_rail"
    visual_type: "slicer"
    business_question: "(structural -- lets the reader pick the period)"
    metric_contract: "none"                            # slicer binds to no metric
    semantic_model_fields:
      dimensions:
        - "<dim_date>.<period_attribute>"             # mapped (F010)
    notes: "slicers stay in the rail so they do not dominate the canvas"

# -----------------------------------------------------------------------------
# qa_rules -- the anti-patterns this page is checked against. NAMES the rule; the
# readable reference lives in docs/powerbi/visual-qa.md and the dashboard-qa
# workflow uses it. Each MUST be false to pass; a true entry is a blocking reason
# or a recorded `warning` with a reason.
# -----------------------------------------------------------------------------
qa_rules:
  one_business_question_per_page: true        # this page answers ONE question
  every_kpi_has_comparison: true              # KPI without comparison -> anti-pattern
  comparison_and_ranking_present: true        # branch comparison + ranking both shown
  consistent_branch_colors: true              # a branch keeps one color everywhere (theme/tokens)
  table_not_used_as_main_executive_visual: true   # the matrix is detail, not the headline
  slicers_do_not_dominate: true               # slicers kept to the filter rail
  consistent_number_formats: true             # one format per measure across visuals
  explicit_date_context: true                 # time visuals name a date field
  no_orphan_visual_without_contract: true     # every data visual cites a contract (F009)
  no_unmapped_field: true                     # every field is in the governed model (F010)
  background_carries_no_dynamic_value: true   # surface-2 purity (structure, not data)
  theme_colors_not_overridden_per_visual: true    # surface-3 defaults reused, not random

# -----------------------------------------------------------------------------
# mobile -- phone layout intent. What survives to a small screen: the KPI strip +
# the top branch-comparison; the per-branch detail table is desktop-only.
# Reference: design/grids/mobile-grid.yaml and the mobile-layout workflow.
# -----------------------------------------------------------------------------
mobile:
  grid: "design/grids/mobile-grid.yaml"
  keep:
    - "kpi_strip"                       # the headline KPIs
    - "main_insight"                    # the branch comparison
  desktop_only:
    - "exception_detail"                # the per-branch detail matrix
    - "diagnostic"                      # the full ranking (or a trimmed top-N on mobile)

# -----------------------------------------------------------------------------
# readiness -- this STARTER's design readiness, with the FOUR statuses only
# (docs/readiness/readiness-model.md). NEVER a numeric confidence score (rule 9).
# A generic starter is `not_started`: it carries placeholders, not an approved,
# contract-bound design for a specific subject area. Never self-grant
# `dashboard_ready: pass` -- that is the verb owner's recorded design-review
# (F011/012), not this file's.
# -----------------------------------------------------------------------------
readiness:
  status: "not_started"                # generic starter; placeholders only
  evidence:
    - "generic starter blueprint; no subject area bound yet"
  blocking_reasons:
    - "no approved metric contracts bound (F009) -- placeholders only"
    - "semantic_model_ready not evaluated for any subject area (F010, rule 5)"
  # NO `score:` / `confidence:` field exists here BY DESIGN (rule 9).

# -----------------------------------------------------------------------------
# see also
# -----------------------------------------------------------------------------
see_also:
  - "docs/powerbi/dashboard-blueprints.md"   # how this blueprint is read + the index
  - "templates/dashboard-page-blueprint.yaml" # the copy-me blank this instantiates
  - "templates/visual-spec.yaml"             # one file per candidate visual when detailed
  - "docs/powerbi/visual-qa.md"              # the anti-pattern reference qa_rules name
  - "docs/readiness/dashboard-ready.md"      # the stage + the contracts-first gate (owner)
  - ".claude/skills/powerbi-dashboard-design/SKILL.md"   # the four-surface router
