# profiles.example.yml -- governed dbt Postgres profile (environment references only)
#
# Copy this file to the gitignored repository-root profiles.yml. Do not replace
# env_var() expressions with connection values. Put real values only in the
# gitignored .env; the Seshat runner loads that file into the child process.
#
# Seshat BI feature 133 activates the runtime planned by F029/spec 023.
# dbt is an Execution Adapter: it builds shadow silver/gold and emits evidence;
# it never grants readiness or a migration-to-dbt build-path approval.

seshat_bi_warehouse:
  target: shadow
  outputs:
    shadow:
      type: postgres
      host: "{{ env_var('SESHAT_DBT_HOST') }}"
      port: "{{ env_var('SESHAT_DBT_PORT', '5432') | int }}"
      user: "{{ env_var('SESHAT_DBT_USER') }}"
      password: "{{ env_var('SESHAT_DBT_PASSWORD') }}"
      dbname: "{{ env_var('SESHAT_DBT_DBNAME') }}"
      schema: "{{ env_var('SESHAT_DBT_SCHEMA', 'seshat_dbt_shadow') }}"
      threads: 4
      sslmode: "{{ env_var('SESHAT_DBT_SSLMODE', 'prefer') }}"
